<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ember & Rust — AFK Idle RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14101c; --panel:#1e1830; --panel2:#271f3d; --border:#4a3d6b;
  --gold:#e8c158; --hp:#c23b3b; --xp:#4d9de0; --mp:#7b3fbf;
  --text:#e9e1f5; --dim:#9186ab; --green:#4fbf5b; --accent:#e07a3f;
}
*{box-sizing:border-box;}
body{margin:0; background:radial-gradient(ellipse at top,#241a38,#0e0b16 70%); color:var(--text); font-family:'VT323',monospace; font-size:18px; min-height:100vh;}
h1,h2,h3,.pixel{font-family:'Press Start 2P',monospace;}
#app{max-width:1150px;margin:0 auto;padding:10px;}
header{display:flex; justify-content:space-between; align-items:center; gap:10px; background:var(--panel); border:2px solid var(--border); border-radius:6px; padding:10px 14px; margin-bottom:8px; flex-wrap:wrap;}
header h1{font-size:13px;color:var(--accent);margin:0;letter-spacing:1px;}
.hstats{display:flex;gap:16px;flex-wrap:wrap;font-size:20px;}
.hstats span b{color:var(--gold);}
.saveStatus{font-size:13px;color:var(--dim);}
select{font-family:'VT323',monospace;font-size:15px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;cursor:pointer;}
select:focus{outline:none;border-color:var(--accent);}
.sellBin{margin-top:6px;min-height:60px;border:2px dashed var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P';font-size:10px;color:var(--gold);background:rgba(232,193,88,.06);}
.sellBin.dragover{border-color:var(--green);background:rgba(79,191,91,.12);}

.tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.tab{background:var(--panel2); border:2px solid var(--border); color:var(--dim); padding:8px 12px; cursor:pointer; border-radius:4px 4px 0 0; font-family:'Press Start 2P'; font-size:10px;}
.tab.active{background:var(--accent); color:#1a1220; border-color:var(--accent);}
.subtabs{display:flex;gap:4px;margin:8px 0;}
.subtab{background:var(--panel2); border:1px solid var(--border); color:var(--dim); padding:6px 10px; cursor:pointer; border-radius:4px; font-size:13px;}
.subtab.active{background:var(--green); color:#0d2b12; border-color:var(--green);}

.layout{display:grid; grid-template-columns: 320px 1fr; gap:8px;}
@media(max-width:820px){.layout{grid-template-columns:1fr;}}

.card{background:var(--panel); border:2px solid var(--border); border-radius:6px; padding:12px; margin-bottom:8px;}
.card h3{margin:0 0 8px 0; font-size:11px; color:var(--accent);}

.barwrap{background:#0b0812; border:1px solid var(--border); border-radius:4px; height:16px; overflow:hidden; position:relative; margin:4px 0;}
.bar{height:100%; transition:width .25s;}
.bar.hp{background:linear-gradient(90deg,#8f1f1f,var(--hp));}
.bar.enemyhp{background:linear-gradient(90deg,#8f1f1f,#e0553f);}
.bar.xp{background:linear-gradient(90deg,#2c6a9e,var(--xp));}
.bar.gather{background:linear-gradient(90deg,#2c8a3e,var(--green));}
.barlabel{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; text-shadow:1px 1px #000;}

.stage{background:linear-gradient(#241c38,#161022); border:2px solid var(--border); border-radius:6px; min-height:260px; padding:14px; position:relative; overflow:hidden; display:flex; flex-direction:column; gap:10px;}
.battlerow{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.partyrow{display:flex; gap:8px; flex-wrap:wrap; flex:1;}
.ccard{background:#1b1428; border:1px solid var(--border); border-radius:6px; padding:6px; width:92px; text-align:center; position:relative;}
.ccard.downed{opacity:.4;}
.ccard .sprite-box{margin:0 auto;}
.ccname{font-size:11px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.rowbadge{position:absolute; top:2px; right:4px; font-size:9px; font-family:'Press Start 2P'; color:var(--gold);}
.miniHp{background:#0b0812;border:1px solid var(--border);border-radius:3px;height:8px;margin-top:3px;overflow:hidden;}
.miniHpFill{height:100%;background:linear-gradient(90deg,#8f1f1f,var(--hp));}
.vsdivider{font-family:'Press Start 2P'; color:var(--accent); font-size:13px; text-align:center;}
.monsterbox{text-align:center; min-width:150px;}
.monsterbox .sprite-box{margin:0 auto;}
.gatherbox{text-align:center; min-width:150px;}

@keyframes flashRed{0%{filter:brightness(1)}40%{filter:brightness(2.2) saturate(3) hue-rotate(-15deg)}100%{filter:brightness(1)}}
@keyframes idlebob{0%{transform:translateY(0)}50%{transform:translateY(-2px)}100%{transform:translateY(0)}}
@keyframes goldAura{0%{box-shadow:0 0 4px var(--gold)}50%{box-shadow:0 0 12px var(--gold)}100%{box-shadow:0 0 4px var(--gold)}}
.hurt-anim .sprite-box{animation:flashRed .35s ease;}
.idle .sprite-box{animation:idlebob 2s ease-in-out infinite;}
.reborn .sprite-box{animation:goldAura 2.5s ease-in-out infinite; border-radius:4px;}

.sprite-box{position:relative; image-rendering:pixelated;}
.pixel-sprite{position:absolute; left:0; top:0;}
.floattext{position:absolute; font-family:'Press Start 2P'; font-size:10px; color:#ff6b6b; animation:floatup 1s forwards; pointer-events:none; left:50%; top:0;}
.floattext.heal{color:#6bff8f;}
.floattext.info{color:var(--gold);}
@keyframes floatup{0%{opacity:1; transform:translate(-50%,0)}100%{opacity:0; transform:translate(-50%,-36px)}}

.log{background:#0b0812; border:1px solid var(--border); border-radius:4px; height:100px; overflow-y:auto; padding:6px 8px; font-size:15px;}
.log div{opacity:.85;}
.log div:last-child{opacity:1;color:var(--gold);}

.zonelist,.itemlist,.recipelist,.partylist,.skilllist{display:flex; flex-direction:column; gap:6px; max-height:520px; overflow-y:auto;}
.zonebtn,.rowitem{background:var(--panel2); border:1px solid var(--border); border-radius:4px; padding:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px;}
.zonebtn:hover,.rowitem:hover{border-color:var(--accent);}
.zonebtn.active{border-color:var(--green); box-shadow:0 0 0 1px var(--green) inset;}
.zonebtn.pending{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset;}
.zonebtn.locked{opacity:.45; cursor:not-allowed;}
.small{font-size:13px; color:var(--dim);}
button{font-family:'VT323',monospace; font-size:16px; background:var(--accent); color:#1a1220; border:none; border-radius:4px; padding:6px 10px; cursor:pointer;}
button:disabled{background:#4a3d6b; color:var(--dim); cursor:not-allowed;}
button.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--border);}
button.tiny{font-size:12px; padding:3px 7px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
.invgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:6px;}
.invslot{background:var(--panel2); border:1px solid var(--border); border-radius:4px; padding:4px; text-align:center; font-size:11px; cursor:grab;}
.invslot:active{cursor:grabbing;}
.invslot .ico{display:flex; justify-content:center; margin-bottom:2px;}
.equipslots{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
.eqslot{background:var(--panel2); border:1px dashed var(--border); border-radius:4px; width:70px; height:70px; display:flex; align-items:center; justify-content:center; flex-direction:column; font-size:9px; text-align:center; position:relative; cursor:pointer;}
.eqslot.dragover{border-color:var(--green);}
.statgrid{display:grid; grid-template-columns:1fr auto auto; gap:4px 10px; align-items:center; font-size:16px;}

.rosterCard{background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:10px; display:flex; align-items:center; gap:10px; cursor:pointer;}
.rosterCard:hover{border-color:var(--accent);}
.rosterCard .info{flex:1;}
.rosterCard .cname{font-size:15px;}
.rosterCard .csub{font-size:12px;color:var(--green);font-family:'Press Start 2P';}

.charHeader{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
.charHeader .info{flex:1;}
.charTitle{font-size:13px;font-family:'Press Start 2P';color:var(--accent);}
.charClass{font-size:12px;color:var(--green);font-family:'Press Start 2P';margin-top:2px;}

.treeWrap{position:relative; overflow-x:auto; padding:10px 0;}
.treeInner{position:relative;}
.skillNode{position:absolute; width:92px; height:74px; background:var(--panel2); border:2px solid var(--border); border-radius:6px; padding:4px; text-align:center; font-size:10px; z-index:1; cursor:pointer; display:flex; flex-direction:column; justify-content:center; gap:2px;}
.skillNode .nname{font-family:'Press Start 2P'; font-size:8px; line-height:1.3;}
.skillNode.unlocked{border-color:var(--green); box-shadow:0 0 8px rgba(79,191,91,.5);}
.skillNode.available{border-color:var(--gold); box-shadow:0 0 6px rgba(232,193,88,.4);}
.skillNode.locked{opacity:.5;}
.skillNode.tome{border-style:dashed;}
.skillNode .cost{font-size:9px;color:var(--gold);}
.branchtag{font-size:8px; padding:1px 4px; border-radius:3px; font-family:'Press Start 2P'; align-self:center;}
.branchtag.Combat{background:#5a1f1f;color:#ffb3b3;}
.branchtag.Magic{background:#2f1f5a;color:#c9b3ff;}
.branchtag.Gathering{background:#1f5a2b;color:#b3ffc0;}
.branchtag.Prestige{background:#5a4b1f;color:#ffe6b3;}
.branchtag.Sub{background:#3a3a45;color:#ddd;}
.treeSvg{position:absolute; top:0; left:0; z-index:0; pointer-events:none;}

footer{text-align:center; color:var(--dim); font-size:13px; padding:14px 0;}
.toast{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--panel); border:2px solid var(--accent); padding:8px 16px; border-radius:6px; font-size:15px; z-index:50;}

#craftModal,#equipModal,#sellModal{display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; align-items:center; justify-content:center;}
#craftModal > div,#equipModal > div,#sellModal > div{background:var(--panel); border:2px solid var(--accent); border-radius:8px; padding:16px; max-width:380px; text-align:center;}
.worldMapWrap{overflow:auto; height:340px; border:1px solid var(--border); border-radius:6px; background:radial-gradient(ellipse at top,#241c38,#120d1c 75%); cursor:grab; user-select:none; scrollbar-width:none; -ms-overflow-style:none;}
.worldMapWrap::-webkit-scrollbar{display:none;}
.worldMapInner{position:relative;}
.mapNode{position:absolute; width:76px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:5px 4px; border-radius:8px; border:2px solid var(--border); background:rgba(30,24,48,.9); text-align:center;}
.mapNode:hover{border-color:var(--accent);}
.mapNode.active{border-color:var(--gold); box-shadow:0 0 8px rgba(232,193,88,.5);}
.mapNode.pending{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset;}
.mapNode.locked{opacity:.4; cursor:not-allowed;}
.mapNode.combat{border-color:#8a3535;}
.mapNode.gather{border-color:#2f6a3f;}
.mapNode.recruit{border-color:#c9a12e;}
.mapNode.combat.active,.mapNode.gather.active,.mapNode.combat.pending{border-color:var(--gold);}
.mapNodeLabel{font-size:9px; line-height:1.25;}
.monstergroup{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; min-width:150px;}
.equipRow{display:flex; justify-content:space-between; align-items:center; gap:8px; padding:6px; border:1px solid var(--border); border-radius:4px; margin-bottom:4px; cursor:pointer;}
.equipRow:hover{border-color:var(--green);}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⚔ EMBER & RUST</h1>
    <div class="hstats">
      <span>💰 <b id="hGold">0</b></span>
      <span>Party: <b id="hPartySize">0</b>/6</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="btnPause" class="tiny">⏸ Pause Save</button>
      <div class="saveStatus" id="saveStatus">Autosave: —</div>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div id="tabContent"></div>

  <footer>Autosaves every 4s • use the SAVES tab for slots & autosave control • click a party member (or yourself) to manage gear, skills & prestige</footer>
</div>
<div id="toastHolder"></div>

<div id="craftModal"><div>
  <div id="craftModalBody"></div>
  <div style="margin-top:12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
    <button id="craftTake">Take</button>
    <button id="craftReroll" class="secondary">Reroll (10g)</button>
    <button id="craftCancel" class="secondary">Cancel</button>
  </div>
</div></div>

<div id="equipModal"><div>
  <h3 id="equipModalTitle"></h3>
  <div id="equipModalBody"></div>
  <div style="margin-top:10px;"><button id="equipModalClose" class="secondary">Close</button></div>
</div></div>

<div id="sellModal"><div>
  <h3 id="sellModalTitle"></h3>
  <div id="sellModalBody"></div>
  <div style="margin-top:12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
    <button id="sellConfirm">Sell</button>
    <button id="sellCancel" class="secondary">Cancel</button>
  </div>
</div></div>

<script>
/* ============ PIXEL ENGINE ============ */
const SCALE = 5;
function spriteHTML(key, scale=SCALE){
  const s = SPRITES[key];
  if(!s) return '';
  const w = s.grid[0].length, h = s.grid.length;
  let shadows = [];
  s.grid.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ const ch=row[x]; if(ch!=='.'&&s.pal[ch]) shadows.push(`${x*scale}px ${y*scale}px 0 0 ${s.pal[ch]}`); } });
  return `<div class="sprite-box" style="width:${w*scale}px;height:${h*scale}px;"><div class="pixel-sprite" style="width:${scale}px;height:${scale}px;box-shadow:${shadows.join(',')};"></div></div>`;
}
const PLAYER_GRID = [
  '...hhhh....','..hssssh...','..sswwss...','..sssss....','.aaaaaaa...','.aaaaaaaa..','.aa.aa.aa..','.oo....oo..','.oo....oo..'];
const SPRITES = {
  player:{pal:{o:'#2b2138',s:'#e8b98b',h:'#5b3a29',a:'#7a4fd1',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_finn:{pal:{o:'#2b2138',s:'#e8b98b',h:'#5b3a29',a:'#3b6fd1',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_mira:{pal:{o:'#2b2138',s:'#e8b98b',h:'#2b1a40',a:'#8a3bd1',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_tess:{pal:{o:'#2b2138',s:'#e8b98b',h:'#3a2a1a',a:'#2f9e4a',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_garrick:{pal:{o:'#2b2138',s:'#e8b98b',h:'#5b3a29',a:'#b03535',b:'#8a6a1e',w:'#e9e1f5'},grid:PLAYER_GRID},
  slime:{pal:{o:'#1d6b2c',O:'#4fbf5b',w:'#eaffea',k:'#123a1a'},grid:['..oOOOo..','.oOOOOOo.','oOOwOwOOo','oOOOOOOOo','oOOOOOOOo','.oOOOOOo.','..ooooo..']},
  goblin:{pal:{g:'#5f9e4a',d:'#2f5a26',b:'#6b4a2b',w:'#eaeaea',k:'#111'},grid:['..dggd...','.dgwgwd..','.dgggd...','..bbb....','.bbbbb...','.b.b.b...','.k...k...']},
  wolf:{pal:{g:'#6b6b78',d:'#3a3a45',w:'#eaeaea',k:'#111'},grid:['.d....d..','dgd..dgd.','dggggggd.','.gwgggwg.','.ggggggg.','d.g..g.d.','d.g..g.d.']},
  boss:{pal:{r:'#8a1f2b',d:'#3a0d12',w:'#ffdca8',k:'#111',b:'#5a1010'},grid:['d..rrrr..d','.d rwwr d.','..drrrrd..','.brrrrrrb.','bbrrrrrrbb','b.b....b.b','b.b....b.b']},
  tree:{pal:{g:'#2f8a3f',G:'#3fae53',b:'#5a3a20'},grid:['..gGGg...','.gGGGGg..','gGGGGGGg.','.gGGGGg..','...bb....','...bb....','...bb....']},
  rock:{pal:{r:'#6b6b78',R:'#8f8f9e',y:'#d1b23c',d:'#3a3a45'},grid:['..rRRr...','.rRRRRr..','rRyRRyRr.','dRRRRRRd.','.dddddd..']},
  crystal:{pal:{c:'#4fd1e0',C:'#9df3fa',d:'#1d5a63'},grid:['..c.c....','.cCCc....','cCCCCc...','.cCCc....','..d.d....']},
  herb:{pal:{l:'#3fae53',L:'#7fe89a',s:'#c94f4f'},grid:['..l.l....','.lLlLl...','lLLLLLl..','.lLlLl...','..s.s....','.sss s...','..s.s....']},
  ore:{pal:{r:'#6b6b78',R:'#8f8f9e',y:'#d1b23c',d:'#3a3a45'},grid:['.rRRr....','rRyRRr...','RyRRyRr..','dRRRRRd..','.ddddd...']},
  mythril:{pal:{m:'#9df3fa',M:'#4fd1e0',d:'#1d5a63'},grid:['..m.m....','.mMmMm...','mMMMMm...','.mMmMm...','..d.d....']},
  staff:{pal:{b:'#c9a12e',s:'#e9e1f5',o:'#8a6236',h:'#5a3a20'},grid:['...b....','...b....','...b....','.obbbo..','.osso o.','.o....o.','.o....o.']},
  bow:{pal:{w:'#8a6236',s:'#e9e1f5'},grid:['w.....w.','ww...ww.','w.w.w.w.','..www...','...w....','...w....','...w....']},
  recruit:{pal:{o:'#2b2138',s:'#e8b98b',h:'#3a2a1a',a:'#c9a12e',b:'#5a3a20',w:'#e9e1f5'},grid:PLAYER_GRID},
  sword:{pal:{b:'#c9a12e',s:'#e9e1f5',h:'#5a3a20'},grid:['...b....','...s....','...s....','...s....','...h....','..hhh...','.hh.hh..']},
  armor:{pal:{a:'#8a6236',A:'#b5824a',b:'#5a3a20'},grid:['.aaaaa...','aAAAAa...','aAaAaAa..','aAAAAAa..','aAaAaAa..','.a...a...','.b...b...']},
  ring:{pal:{g:'#e8c158',d:'#b8860b'},grid:['.........','..ddd....','.dgggd...','.dg.gd...','.dgggd...','..ddd....','.........']},
  amulet:{pal:{g:'#e8c158',b:'#5a3a20',c:'#4fd1e0'},grid:['..b.b....','.b.b.b...','.bcbcb...','.b.b.b...','..b.b....','...b.....','.........']},
  charm:{pal:{r:'#c23b3b',g:'#4fbf5b',b:'#5a3a20'},grid:['..b.b....','.brbg b..','.bgbgb..','.brbgb..','..b.b....','.........','.........']},
  book:{pal:{r:'#8a1f2b',p:'#e8c158',w:'#e9e1f5'},grid:['.rrrr....','rppppr...','rwppwr...','rwppwr...','rwppwr...','rppppr...','.rrrr....']},
  tome:{pal:{r:'#5a1010',p:'#e8c158',w:'#e9e1f5'},grid:['.rrrr r..','rpppppr..','rwppwvr..','rwppwvr..','rwppwvr..','rpppppr..','.rrrr r..']},
  chest:{pal:{b:'#6b4a2b',B:'#8a6236',y:'#e8c158',k:'#2a1a10'},grid:['bBBBBBBb','bBBBBBBb','kkkykkkk','BBBBBBBB','BBBBBBBB','bbbbbbbb']},
};

/* ============ RARITY ============ */
const RARITIES = [
  {id:'common',name:'Common',mult:1.0,color:'#b5b5b5',weight:52},
  {id:'rare',name:'Rare',mult:1.3,color:'#4d9de0',weight:30},
  {id:'epic',name:'Epic',mult:1.7,color:'#a24dd1',weight:14},
  {id:'legendary',name:'Legendary',mult:2.3,color:'#e8c158',weight:4},
];
function rarityInfo(id){ return RARITIES.find(r=>r.id===id) || RARITIES[0]; }
function rollRarity(){ const total=RARITIES.reduce((s,r)=>s+r.weight,0); let roll=Math.random()*total; for(const r of RARITIES){ if(roll<r.weight) return r; roll-=r.weight; } return RARITIES[0]; }

/* ============ CLASSES ============ */
const CLASSES = {
  Warrior:{base:{atk:2,def:2,mag:0,vit:10}, branches:['Combat'], desc:'Tanky melee'},
  Mage:{base:{atk:0,def:0,mag:4,vit:4}, branches:['Magic'], desc:'Spell user'},
  Forager:{base:{atk:1,def:1,mag:0,vit:6}, branches:['Gathering'], desc:'Resource focus'},
  Ranger:{base:{atk:2,def:1,mag:0,vit:6}, branches:['Combat','Gathering'], desc:'Hybrid'},
  Druid:{base:{atk:1,def:1,mag:2,vit:6}, branches:['Magic','Gathering'], desc:'Nature caster'},
  Battlemage:{base:{atk:1,def:0,mag:3,vit:5}, branches:['Combat','Magic'], desc:'Spellblade'},
};
function classBase(className){ return CLASSES[className] ? CLASSES[className].base : {atk:0,def:0,mag:0,vit:0}; }

/* ============ ITEMS ============ */
const ITEMS = {
  wood:{name:'Wood',icon:'tree',sell:1}, stone:{name:'Stone',icon:'rock',sell:1},
  ore:{name:'Ore',icon:'ore',sell:2}, herb:{name:'Herb',icon:'herb',sell:1},

/* ============ PROC GEN WORLD MAP ============ */
function hashXY(seed,x,y){ let h=seed>>>0; h=Math.imul(h^x,0x27d4eb2d); h=Math.imul(h^y,0x85ebca6b); h^=h>>>15; h=Math.imul(h,0xc2b2ae35); h^=h>>>13; return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function rngAt(x,y){ return mulberry32(hashXY(S.mapSeed>>>0,x,y)); }
function seedFromString(str){ str=String(str).trim(); if(str==='') return Math.floor(Math.random()*4294967295); if(/^-?\d+$/.test(str)) return Math.abs(parseInt(str,10))>>>0; let h=0; for(let i=0;i<str.length;i++){ h=Math.imul(h,31)+str.charCodeAt(i)|0; } return h>>>0; }
const ORIGIN_LAYOUT={'0,0':'z_slime','-1,0':'z_woods','0,-1':'z_grove','1,0':'z_goblin','-1,-1':'z_quarry','2,0':'z_wolfden','3,0':'z_bossden'};
const ORIGIN_COORDS={}; Object.entries(ORIGIN_LAYOUT).forEach(([k,id])=>{ const [x,y]=k.split(',').map(Number); ORIGIN_COORDS[id]=[x,y]; });
function genProcZone(x,y){
  const rnd=rngAt(x,y); const dist=Math.max(Math.abs(x),Math.abs(y));
  if(dist>=2 && rnd()<0.08){ const t=(hashXY(S.mapSeed>>>0,x,y)%97)+1; const rec=getProcRecruit(t); return {id:`pz_${x}_${y}`,name:rec.name,sprite:'recruit',type:'recruit',lvl,reqBoss:true,recruitId:rec.id}; }
  const isCombat=rnd()<0.55; const lvl=20+dist*4;
  if(isCombat){ const sprites=['boss','wolf','goblin','slime']; const sp=sprites[Math.floor(rnd()*sprites.length)]; const hp=Math.round(260*Math.pow(1.28,Math.max(0,dist-1))); const atk=24+dist*4,def=14+dist*3,xp=80+dist*30; const cmax=Math.min(5,2+Math.floor(dist/3));
    return {id:`pz_${x}_${y}`,name:`Wilds Lair (${x},${y})`,type:'combat',lvl,sprite:sp,monster:{name:'Beast of the Wilds',hp,atk,def,xp,gold:[30+dist*12,55+dist*18],countMin:1,countMax:cmax,loot:[{id:'boss_fang',chance:0.3},{id:'mythril',chance:0.15},{id:'mythril_blade',chance:0.06},{id:'mythril_plate',chance:0.06},{id:'fang_blade',chance:0.08}]}}; }
  const sprites=['tree','rock','crystal']; const sp=sprites[Math.floor(rnd()*sprites.length)];
  return {id:`pz_${x}_${y}`,name:`Wild Grove (${x},${y})`,type:'gather',lvl,sprite:sp,time:4,resource:{wood:1,herb:1,ore:1,crystal:0.3,mythril:0.05*dist}};
}
function getZoneAt(x,y){ const oid=ORIGIN_LAYOUT[x+','+y]; if(oid) return ZONES.find(z=>z.id===oid); return genProcZone(x,y); }
function coordsOfZoneId(id){ if(ORIGIN_COORDS[id]) return ORIGIN_COORDS[id]; const m=/^pz_(-?\d+)_(-?\d+)$/.exec(id); return m?[parseInt(m[1]),parseInt(m[2])]:null; }
function getZoneById(id){ const z0=ZONES.find(z=>z.id===id); if(z0) return z0; const c=coordsOfZoneId(id); return c?genProcZone(c[0],c[1]):null; }
function tileNeighbors(x,y){ return [[x+1,y],[x-1,y],[x,y+1],[x,y-1]]; }
function isTileCleared(x,y){ return !!S.clearedZones[getZoneAt(x,y).id]; }
function isPlayable(x,y){ if(ORIGIN_LAYOUT[x+','+y]) return true; return tileNeighbors(x,y).some(([nx,ny])=>isTileCleared(nx,ny)); }
function isPlayableZone(z){ const c=coordsOfZoneId(z.id); return c?isPlayable(c[0],c[1]):false; }
function visibleTiles(){ const set=new Map(); const add=(x,y)=>set.set(x+','+y,{x,y}); Object.keys(ORIGIN_LAYOUT).forEach(k=>{ const [x,y]=k.split(',').map(Number); add(x,y); }); Object.keys(S.clearedZones).forEach(id=>{ const c=coordsOfZoneId(id); if(!c) return; add(c[0],c[1]); tileNeighbors(c[0],c[1]).forEach(([nx,ny])=>add(nx,ny)); }); return [...set.values()]; }
function genProcRecruit(t){ const names=['Rurik','Sable','Owyn','Vex','Nadia','Bram','Lyra','Cole','Senn','Thora','Ignus','Fenn']; const name=names[(t-1)%names.length]+(t>names.length?' '+(t-names.length+1):''); const sprite=['ally_finn','ally_mira','ally_tess','ally_garrick'][t%4]; const baseAtk=5+t*2,baseDef=3+t,maxHpBase=50+t*10; const cost=100+t*60; const cls=['Warrior','Mage','Ranger','Druid','Battlemage','Forager'][t%6]; return {id:'prec_'+t,name:'Wanderer '+name,cost,base:{atk:baseAtk,def:baseDef},maxHpBase,sprite,class:cls}; }
function getProcRecruit(t){ if(!S.procRecruits) S.procRecruits={}; if(S.procRecruits[t]) return S.procRecruits[t]; S.procRecruits[t]=genProcRecruit(t); return S.procRecruits[t]; }
function getAllRecruits(){ const list=PARTY_POOL.slice(); for(let t=1;t<=(S.recruitProcTier||0);t++) list.push(getProcRecruit(t)); return list; }
function onZoneCleared(zone){ S.recruitUnlocked=(S.recruitUnlocked||PARTY_POOL.length)+1; const need=S.recruitUnlocked-(PARTY_POOL.length+(S.recruitProcTier||0)); if(need>0) S.recruitProcTier=(S.recruitProcTier||0)+need; log(`★ Cleared ${zone.name}! Nearby area revealed & recruit unlocked.`); toast('Zone cleared — new area revealed!'); }
function regenerateWorldMap(seed){ S.mapSeed=seed; S.clearedZones={}; S.dungeonZone='z_slime'; S.gatherZone='z_woods'; S.pendingDungeonZone=null; S.monsterGroup=[]; S.gatherProgress=0; previewZoneId=null; mapScroll=null; toast('World regenerated (seed '+seed+')'); }
function anyBossCleared(){ return Object.keys(S.clearedZones).some(id=>{ const z=getZoneById(id); return z&&z.type==='combat'&&z.sprite==='boss'; }); }

function normalizeState(st){ st=st||{}; if(!st.gearInstances) st.gearInstances={}; if(!st.deployment) st.deployment={front:['player'],back:[]}; if(st.inventory&&!st.invGrid) migrateInv(st); if(!st.invGrid) st.invGrid=new Array(36).fill(null); if(!st.dungeonZone) st.dungeonZone='z_slime'; if(!st.gatherZone) st.gatherZone='z_woods'; if(st.gatherer===undefined) st.gatherer=null; if(!st.clearedZones) st.clearedZones={}; if(st.mapSeed===undefined) st.mapSeed=Math.floor(Math.random()*4294967295); if(!st.recruitUnlocked) st.recruitUnlocked=PARTY_POOL.length; if(!st.recruitProcTier) st.recruitProcTier=0; if(!st.procRecruits) st.procRecruits={}; if(!st.autoSell) st.autoSell=new Array(5).fill(null); if(!st.recruitedNodes) st.recruitedNodes={}; if(!st.activeRoster||!st.activeRoster.length) st.activeRoster=['player',...((st.party||[]).slice(0,ACTIVE_CAP-1).map(m=>m.id))]; else { st.activeRoster=st.activeRoster.filter(k=>k==='player'||(st.party||[]).some(m=>m.id===k)); if(!st.activeRoster.includes('player')) st.activeRoster.unshift('player'); } delete st.unlockedCount; delete st.procZoneTier; delete st.procZones; if(st.zone){ const z=ZONES.find(zz=>zz.id===st.zone); if(z&&z.type==='combat') st.dungeonZone=st.zone; else if(z) st.gatherZone=st.zone; delete st.zone; } if(!st.monsterGroup) st.monsterGroup=[]; if(st.gatherProgress===undefined) st.gatherProgress=0; if(st.pendingDungeonZone===undefined) st.pendingDungeonZone=null; const eb=e=>{ if(e&&!e.branchLevels) e.branchLevels={Combat:0,Magic:0,Gathering:0}; if(e&&e.rebirths===undefined) e.rebirths=0; if(e&&!e.class) e.class='Adventurer'; }; if(st.player) eb(st.player); (st.party||[]).forEach(eb); return st; }

let S=normalizeState(loadActive()||freshState());
let PD={}, MEMBER_DERIVED={}, SHARED={lootPct:0,goldPct:0}, gearUidCounter=0;
function loadActive(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)); }catch(e){ return null; } }

/* ============ GEAR ============ */
function createGearInstance(baseId){ const base=ITEMS[baseId]; const rarity=rollRarity(); const bonus={}; Object.entries(base.baseBonus||{}).forEach(([k,v])=>bonus[k]=Math.round(v*rarity.mult)); const uid='g'+(++gearUidCounter)+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); const inst={uid,baseId,rarity:rarity.id,bonus}; S.gearInstances[uid]=inst; return inst; }
function gearInstanceLabel(inst){ const base=ITEMS[inst.baseId]; const rar=rarityInfo(inst.rarity); return {name:`${rar.name} ${base.name}`,icon:base.icon,color:rar.color}; }
function tintedWeapon(sprKey,color,scale=SCALE){ const g=SPRITES[sprKey].grid; let sh=[]; g.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ const ch=row[x]; if(ch==='.') continue; let col; if(sprKey==='sword') col=ch==='b'?color:(ch==='s'?'#e9e1f5':'#5a3a20'); else if(sprKey==='staff') col=ch==='b'?color:(ch==='s'?'#e9e1f5':(ch==='o'?'#8a6236':'#5a3a20')); else col=ch==='w'?color:'#e9e1f5'; sh.push(`${x*scale}px ${y*scale}px 0 0 ${col}`); } }); return `<div class="sprite-box" style="width:${g[0].length*scale}px;height:${g.length*scale}px;"><div class="pixel-sprite" style="width:${scale}px;height:${scale}px;box-shadow:${sh.join(',')};"></div></div>`; }

/* ============ GRID INV ============ */
function gridCountMat(id){ let n=0; S.invGrid.forEach(c=>{ if(c&&c.kind==='mat'&&c.id===id) n+=c.qty; }); return n; }
function gridAddMat(id,qty){ for(const c of S.invGrid){ if(c&&c.kind==='mat'&&c.id===id&&c.qty<99){ const s=99-c.qty,a=Math.min(s,qty); c.qty+=a; qty-=a; if(qty<=0) return 0; } } for(let i=0;i<S.invGrid.length;i++){ if(!S.invGrid[i]&&qty>0){ const a=Math.min(99,qty); S.invGrid[i]={kind:'mat',id,qty:a}; qty-=a; if(qty<=0) return 0; } } return qty; }
function gridRemoveMat(id,qty){ for(let i=0;i<S.invGrid.length;i++){ const c=S.invGrid[i]; if(c&&c.kind==='mat'&&c.id===id){ const t=Math.min(c.qty,qty); c.qty-=t; qty-=t; if(c.qty<=0) S.invGrid[i]=null; if(qty<=0) return; } } }
function gridAddGear(uid){ for(let i=0;i<S.invGrid.length;i++){ if(!S.invGrid[i]){ S.invGrid[i]={kind:'gear',uid}; return true; } } return false; }
function gridRemoveGear(uid){ for(let i=0;i<S.invGrid.length;i++){ const c=S.invGrid[i]; if(c&&c.kind==='gear'&&c.uid===uid){ S.invGrid[i]=null; return; } } }
function gridHasGear(uid){ return S.invGrid.some(c=>c&&c.kind==='gear'&&c.uid===uid); }

/* ============ AUTO-SELL ============ */
function sellValue(inst){ const r=rarityInfo(inst.rarity); const base=5+Object.values(inst.bonus).reduce((a,b)=>a+b,0); return Math.max(1,Math.round(base*r.mult)); }
function checkAutoSell(inst){ if(!S.autoSell) return false; for(const rule of S.autoSell){ if(rule&&rule.baseId===inst.baseId){ const rt=RARITIES.findIndex(r=>r.id===inst.rarity); const maxRt=RARITIES.findIndex(r=>r.id===rule.maxRarity); if(rt<=maxRt){ gainGold(sellValue(inst)); delete S.gearInstances[inst.uid]; return true; } } } return false; }

/* ============ DERIVED ============ */
function deriveSkillBonuses(sk){ let atkPct=0,defPct=0,magPct=0,xpPct=0,gatherPct=0,lootPct=0,luckFlat=0; Object.keys(sk).forEach(id=>{ const n=SKILL_TREE.find(x=>x.id===id); if(!n) return; const e=n.effect||{}; atkPct+=e.atkPct||0; defPct+=e.defPct||0; magPct+=e.magPct||0; xpPct+=e.xpPct||0; gatherPct+=e.gatherPct||0; lootPct+=e.lootPct||0; luckFlat+=e.luckFlat||0; }); return {atkPct,defPct,magPct,xpPct,gatherPct,lootPct,luckFlat}; }
function gearBonusSum(eq){ let atk=0,def=0,mag=0,luck=0,hp=0; ['weapon','armor','accessory'].forEach(s=>{ const u=eq[s]; const i=u&&S.gearInstances[u]; if(i){ const b=i.bonus||{}; atk+=b.atk||0; def+=b.def||0; mag+=b.mag||0; luck+=b.luck||0; hp+=b.hp||0; } }); return {atk,def,mag,luck,hp}; }
function prestigeBonusSum(r){ let sp=0,xp=0,lo=0,go=0; PRESTIGE_TREE.forEach(n=>{ const rk=r[n.id]||0; if(!rk) return; const e=n.effect; sp+=(e.statPct||0)*rk; xp+=(e.xpPct||0)*rk; lo+=(e.lootPct||0)*rk; go+=(e.goldPct||0)*rk; }); return {statPct:sp,xpPct:xp,lootPct:lo,goldPct:go}; }
function applyClassBase(e,base){ const cb=classBase(e.class); base.atk+=cb.atk||0; base.def+=cb.def||0; base.mag+=cb.mag||0; base.vit+=cb.vit||0; }
function derivePlayer(){ const p=S.player; let atk=p.base.atk+p.allocated.atk*2, def=p.base.def+p.allocated.def*2, mag=p.base.mag+p.allocated.mag*2, luck=p.base.luck+p.allocated.luck, vit=p.base.vit+p.allocated.vit*8; const cb={atk:0,def:0,mag:0,vit:0}; applyClassBase(p,cb); atk+=cb.atk; def+=cb.def; mag+=cb.mag; vit+=cb.vit; const pr=prestigeBonusSum(p.prestigeRanks); atk*=(1+pr.statPct/100); def*=(1+pr.statPct/100); mag*=(1+pr.statPct/100); vit*=(1+pr.statPct/100); const g=gearBonusSum(p.equip); atk+=g.atk; def+=g.def; mag+=g.mag; luck+=g.luck; const sk=deriveSkillBonuses(p.skills); const bl=p.branchLevels||{Combat:0,Magic:0,Gathering:0}; atk*=(1+(sk.atkPct+bl.Combat*2)/100); def*=(1+(sk.defPct+bl.Combat*2)/100); mag*=(1+(sk.magPct+bl.Magic*2)/100); luck+=sk.luckFlat; const maxHp=Math.round(vit*3)+g.hp; PD={atk:Math.round(atk),def:Math.round(def),mag:Math.round(mag),luck:Math.round(luck),maxHp,xpPct:sk.xpPct+pr.xpPct,gatherPct:sk.gatherPct+bl.Gathering*3,lootPctOwn:sk.lootPct+pr.lootPct+bl.Gathering*1,goldPctOwn:pr.goldPct}; if(p.maxHp!==maxHp){ p.maxHp=maxHp; if(!p.hp) p.hp=maxHp; } p.hp=Math.min(p.hp,p.maxHp); }
function deriveMember(m){ const pool=memberPool(m.id); let atk=pool.base.atk+m.level*1+(m.allocated.atk||0)*2, def=pool.base.def+m.level*1+(m.allocated.def||0)*2, maxHpBase=pool.maxHpBase+m.level*5+(m.allocated.hp||0)*10; const cb={atk:0,def:0,mag:0,vit:0}; applyClassBase(m,cb); atk+=cb.atk; def+=cb.def; maxHpBase+=cb.vit*3; const pr=prestigeBonusSum(m.prestigeRanks); atk*=(1+pr.statPct/100); def*=(1+pr.statPct/100); maxHpBase*=(1+pr.statPct/100); const g=gearBonusSum(m.equip); atk+=g.atk; def+=g.def; const sk=deriveSkillBonuses(m.skills); const bl=m.branchLevels||{Combat:0,Magic:0,Gathering:0}; atk*=(1+(sk.atkPct+bl.Combat*2)/100); def*=(1+(sk.defPct+bl.Combat*2)/100); const maxHp=Math.round(maxHpBase)+g.hp; const d={atk:Math.round(atk),def:Math.round(def),maxHp,luck:(g.luck||0)+(sk.luckFlat||0),xpPct:sk.xpPct+pr.xpPct,gatherPct:sk.gatherPct+bl.Gathering*3,lootPctOwn:sk.lootPct+pr.lootPct+bl.Gathering*1,goldPctOwn:pr.goldPct}; if(m.maxHp!==maxHp){ m.maxHp=maxHp; if(!m.hp) m.hp=maxHp; } m.hp=Math.min(m.hp,m.maxHp); return d; }

recalcAll();

function branchInvestment(sk){ const c={Combat:0,Magic:0,Gathering:0}; Object.keys(sk).forEach(id=>{ const n=SKILL_TREE.find(x=>x.id===id); if(n&&c[n.branch]!==undefined) c[n.branch]+=(n.cost||1); }); return c; }
function classLabelFor(sk){ const c=branchInvestment(sk); const e=Object.entries(c).sort((a,b)=>b[1]-a[1]); const [t,s]=e; if(t[1]===0) return 'Adventurer'; if(!s||s[1]===0||t[1]-s[1]>=3) return t[0]==='Combat'?'Warrior':t[0]==='Magic'?'Mage':'Forager'; const p=[t[0],s[0]].sort().join('+'); const cm={'Combat+Magic':'Battlemage','Combat+Gathering':'Ranger','Gathering+Magic':'Druid'}; return cm[p]||t[0]; }

function xpToNext(l){ return Math.floor(30*Math.pow(l,1.4))+20; }

/* ============ LOG ============ */
function log(m){ S.log.push(m); if(S.log.length>60) S.log.shift(); }
function toast(m){ const el=document.createElement('div'); el.className='toast'; el.textContent=m; document.getElementById('toastHolder').appendChild(el); setTimeout(()=>el.remove(),2200); }

/* ============ DEPLOYMENT ============ */
let pendingDeployment=null;
function ensurePending(){ if(!pendingDeployment){ pendingDeployment=JSON.parse(JSON.stringify(S.deployment)); const act=S.activeRoster||['player']; pendingDeployment.front=pendingDeployment.front.filter(k=>act.includes(k)); pendingDeployment.back=pendingDeployment.back.filter(k=>act.includes(k)); } }
function draftRow(k){ ensurePending(); if(pendingDeployment.front.includes(k)) return 'front'; if(pendingDeployment.back.includes(k)) return 'back'; return 'bench'; }
function setDraftRow(k,r){ ensurePending(); pendingDeployment.front=pendingDeployment.front.filter(x=>x!==k); pendingDeployment.back=pendingDeployment.back.filter(x=>x!==k); if(r==='front') pendingDeployment.front.push(k); else if(r==='back') pendingDeployment.back.push(k); }
function committedRow(k){ if(S.deployment.front.includes(k)) return 'front'; if(S.deployment.back.includes(k)) return 'back'; return 'bench'; }

/* ============ ZONES ============ */
function currentDungeonZone(){ let z=getZoneById(S.dungeonZone); if(!z||z.type!=='combat'||!isPlayableZone(z)) z=getZoneById('z_slime'); return z||null; }
function currentGatherZone(){ let z=getZoneById(S.gatherZone); if(!z||z.type!=='gather'||!isPlayableZone(z)) z=getZoneById('z_woods'); return z||null; }

/* ============ COMBAT ============ */
function rollLoot(list,quiet){ list.forEach(e=>{ let ch=e.chance*(1+SHARED.lootPct/100)*(1+(PD.luck||0)*0.01); if(Math.random()<ch){ const it=ITEMS[e.id]; if(it&&it.slot){ const inst=createGearInstance(e.id); if(checkAutoSell(inst)){ if(!quiet) log(`Auto-sold ${it.name}`); } else { gridAddGear(inst.uid); if(!quiet) log(`Found ${rarityInfo(inst.rarity).name} ${it.name}!`); } } else gridAddMat(e.id,1); } }); }
function ensureMonsterGroup(z){ if(!S.monsterGroup) S.monsterGroup=[]; if(S.monsterGroup.length===0){ const cmin=z.monster.countMin||1, cmax=z.monster.countMax||cmin; const n=cmin+Math.floor(Math.random()*(cmax-cmin+1)); for(let i=0;i<n;i++) S.monsterGroup.push({hp:z.monster.hp,maxHp:z.monster.hp,rewarded:false}); } }
function gainXPFor(en,isP,am){ const xpPct=isP?PD.xpPct:(MEMBER_DERIVED[en.id]?MEMBER_DERIVED[en.id].xpPct:0); am*=(1+xpPct/100); en.xp+=am; let lv=false; while(en.xp>=xpToNext(en.level)){ en.xp-=xpToNext(en.level); en.level++; en.skillPts+=1; en.statPts=(en.statPts||0)+3; lv=true; } if(lv){ recalcAll(); en.hp=en.maxHp; log(`✦ ${isP?'You':memberPool(en.id).name} reached Lv ${en.level}!`); } }
function gainGold(a){ a=Math.round(a*(1+SHARED.goldPct/100)); S.gold+=a; S.lifetimeGold+=a; }
function getCombatants(){ const list=[]; const all=[{key:'player',isP:true,en:S.player,sp:'player',nm:'You',d:PD}]; S.party.forEach(m=>all.push({key:m.id,isP:false,en:m,sp:memberPool(m.id).sprite,nm:memberPool(m.id).name,d:MEMBER_DERIVED[m.id]})); all.forEach(c=>{ if(c.key===S.gatherer) return; const row=committedRow(c.key); if(row==='bench') return; list.push({key:c.key,nm:c.nm,sp:c.sp,isP:c.isP,en:c.en,row,get hp(){return c.en.hp;},set hp(v){c.en.hp=v;},get maxHp(){return c.en.maxHp;},get downed(){return c.en.downed||0;},set downed(v){c.en.downed=v;},atk:c.d.atk,def:c.d.def}); }); return list; }
let tickEvents=null;
function doTick(quiet){ const ev=quiet?null:{hits:[],monsterHits:[],monsterDied:false,gathered:false}; tickDungeon(quiet,ev); tickGather(quiet,ev); if(!quiet) tickEvents=ev; }
function reviveCost(en){ return Math.max(1,Math.round(en.maxHp*0.25)); }
function tickDungeon(quiet,ev){ const z=currentDungeonZone(); if(!z||z.type!=='combat') return; ensureMonsterGroup(z); const cs=getCombatants(); const aliveMonsters=()=>S.monsterGroup.filter(m=>m.hp>0);
  cs.forEach(c=>{ if(c.downed>0||c.hp<=0) return; const targets=aliveMonsters(); if(!targets.length) return; const t=targets[Math.floor(Math.random()*targets.length)]; const idx=S.monsterGroup.indexOf(t); const dmg=Math.max(1,c.atk-z.monster.def); t.hp-=dmg; if(ev) ev.hits.push({key:c.key,dmg,monsterIdx:idx});
    if(c.en.skills&&c.en.skills['s_berserk']){ c.en.berserkCd=(c.en.berserkCd||0)-1; if(c.en.berserkCd<=0){ const bt=aliveMonsters(); if(bt.length){ const bm=bt[Math.floor(Math.random()*bt.length)]; const bidx=S.monsterGroup.indexOf(bm); const b=Math.round(c.atk*1.5); bm.hp-=b; c.en.berserkCd=8; if(ev) ev.hits.push({key:c.key,dmg:b,monsterIdx:bidx}); if(!quiet) log(`⚡ ${c.nm} Berserk! +${b}`); } } } });
  S.monsterGroup.forEach(m=>{ if(m.hp<=0&&!m.rewarded){ m.rewarded=true; cs.forEach(c=>{ if(c.downed>0||c.hp<=0) return; gainXPFor(c.en,c.isP,z.monster.xp); }); const [lo,hi]=z.monster.gold; gainGold(lo+Math.random()*(hi-lo)); rollLoot(z.monster.loot,quiet); if(!quiet) log(`Defeated ${z.monster.name}!`); } });
  if(aliveMonsters().length===0){ if(ev) ev.monsterDied=true; if(!S.clearedZones[z.id]){ S.clearedZones[z.id]=true; onZoneCleared(z); } S.monsterGroup=[]; ensureMonsterGroup(z); }
  else { const alive=cs.filter(c=>c.downed<=0&&c.hp>0); const af=alive.filter(c=>c.row==='front'); const tp=af.length?af:alive; if(tp.length){ aliveMonsters().forEach(()=>{ const t=tp[Math.floor(Math.random()*tp.length)]; const md=Math.max(1,z.monster.atk-t.def); t.hp-=md; if(t.hp<=0){ t.hp=0; t.downed=3; if(!quiet) log(`${t.nm} downed!`); } if(ev) ev.monsterHits.push({key:t.key,dmg:md}); }); } }
  cs.forEach(c=>{ if(c.downed>0){ c.downed-=1; if(c.downed<=0){ const cost=reviveCost(c.en); if(S.gold>=cost){ S.gold-=cost; c.hp=c.maxHp; log(`${c.nm} revived (-${cost}g)`); } else { c.downed=1; if(!quiet) toast(`${c.nm} needs ${cost}g to revive`); } } } });
}
function tickGather(quiet,ev){ if(!S.gatherer) return; const z=currentGatherZone(); if(!z||z.type!=='gather') return; const en=charEntity(S.gatherer); const d=charDerived(S.gatherer); S.gatherProgress+=(100/z.time)*(1+(d.gatherPct||0)/100); if(S.gatherProgress>=100){ S.gatherProgress=0; Object.entries(z.resource).forEach(([id,a])=>{ if(a>=1||Math.random()<a) gridAddMat(id,Math.max(1,Math.round(a))); }); if(!quiet){ log(`${charName(S.gatherer)} gathered.`); ev.gathered=true; } } if(en.skills&&en.skills['s_regrowth']){ en.regrowthCd=(en.regrowthCd||0)-1; if(en.regrowthCd<=0){ const k=Object.keys(z.resource)[0]; gridAddMat(k,2); en.regrowthCd=10; if(!quiet) log(`🌿 ${charName(S.gatherer)} Regrowth!`); } } }

function spawnFloat(id,txt,cls){ const h=document.getElementById(id); if(!h) return; const el=document.createElement('div'); el.className='floattext'+(cls?' '+cls:''); el.style.left=(30+Math.random()*40)+'%'; el.textContent=txt; h.style.position=h.style.position||'relative'; h.appendChild(el); setTimeout(()=>el.remove(),950); }

/* ============ OFFLINE ============ */
function runOffline(){ const now=Date.now(); const d=Math.floor((now-(S.lastTick||now))/1000); if(d>2){ const ticks=Math.floor(Math.min(d,10800)*1000/TICK_MS); if(ticks>0){ const gb=S.gold; for(let i=0;i<ticks;i++) doTick(true); const e=Math.round(S.gold-gb); if(e>0||ticks>5) toast(`Welcome back! +${e}g`); } } S.lastTick=now; }

/* ============ LOOP ============ */
let dragInProgress=false;
setInterval(()=>{ doTick(false); S.lastTick=Date.now(); renderTop(); if(currentTab==='zones'){ renderStageCol(); if(tickEvents) applyTickAnim(tickEvents); } if(currentTab==='inventory'&&!dragInProgress) renderInventoryGrid(); tickEvents=null; }, TICK_MS);

function applyTickAnim(ev){ ev.hits.forEach(h=>{ if(h.dmg) spawnFloat('cc-monster-'+h.monsterIdx,'-'+Math.round(h.dmg)); }); (ev.monsterHits||[]).forEach(h=>spawnFloat('cc-'+h.key,'-'+Math.round(h.dmg))); if(ev.gathered) spawnFloat('cc-gatherbox','+1','info'); }

let currentTab='zones', selectedChar=null, charTab='equip';
const TABS=[{id:'zones',label:'ZONES'},{id:'inventory',label:'INVENTORY'},{id:'crafting',label:'CRAFTING'},{id:'party',label:'PARTY'},{id:'saves',label:'SAVES'}];
function renderTabs(){ const el=document.getElementById('tabs'); el.innerHTML=TABS.map(t=>`<div class="tab ${t.id===currentTab?'active':''}" data-tab="${t.id}">${t.label}</div>`).join(''); el.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ currentTab=b.dataset.tab; renderAll(); }); }
function renderTop(){ document.getElementById('hGold').textContent=Math.floor(S.gold); document.getElementById('hPartySize').textContent=S.activeRoster.filter(k=>k!=='player'||true).length+(S.party.length>0?0:0); document.getElementById('hPartySize').textContent=(S.activeRoster.length-1)+'/'+ACTIVE_CAP+' active'; }
function rebornClass(k){ const e=charEntity(k); return (e&&e.rebirths>0)?'reborn':''; }
function combatantCardHTML(c){ const pct=Math.max(0,c.hp)/c.maxHp*100; return `<div class="ccard ${c.downed>0?'downed':rebornClass(c.key)}" id="cc-${c.key}"><div class="rowbadge">${c.row==='front'?'F':'B'}</div>${spriteHTML(c.sp,3)}<div class="ccname">${c.nm}${c.downed>0?' 💫':''}</div><div class="miniHp"><div class="miniHpFill" style="width:${pct}%"></div></div></div>`; }
function monsterCardHTML(m,idx,z){ const pct=m.maxHp?Math.max(0,m.hp)/m.maxHp*100:0; const dead=m.hp<=0; return `<div class="ccard monsterbox ${dead?'downed':'idle'}" id="cc-monster-${idx}">${spriteHTML(z.sprite,3)}<div class="ccname">${z.monster.name}${(z.monster.countMax||1)>1?` #${idx+1}`:''}</div><div class="barwrap" style="margin:2px 0;"><div class="bar enemyhp" style="width:${pct}%"></div><div class="barlabel" style="font-size:9px;">${Math.max(0,Math.round(m.hp))}/${m.maxHp}</div></div></div>`; }
function renderDungeonStage(){ const z=currentDungeonZone(); if(!z||z.type!=='combat') return `<div class="card"><h3>Dungeon</h3><div class="small">Select a Dungeon Zone on the map, preview it, then Deploy.</div></div>`; ensureMonsterGroup(z); const cs=getCombatants(); const logHtml=S.log.slice(-30).map(l=>`<div>${l}</div>`).join(''); const monstersHtml=S.monsterGroup.map((m,i)=>monsterCardHTML(m,i,z)).join(''); return `<div class="card"><h3>${z.name} ⚔</h3><div class="stage"><div class="battlerow"><div class="partyrow">${cs.map(combatantCardHTML).join('')}</div><div class="vsdivider">VS</div><div class="monstergroup">${monstersHtml}</div></div></div><div class="log" id="logbox">${logHtml}</div></div>`; }
function renderGatherCard(){ const z=currentGatherZone(); if(!S.gatherer) return `<div class="card"><h3>Gather Duty</h3><div class="small">Assign a member (or yourself) to gather while the rest fight. Both run in parallel, even idle/away.</div></div>`; const g=charEntity(S.gatherer); const gd=charDerived(S.gatherer); return `<div class="card"><h3>Gather — ${charName(S.gatherer)}</h3><div class="battlerow"><div class="partyrow"><div class="ccard idle ${rebornClass(S.gatherer)}" id="cc-gather">${spriteHTML(charSprite(S.gatherer),3)}<div class="ccname">${charName(S.gatherer)}</div></div></div><div class="gatherbox" id="cc-gatherbox">${z?spriteHTML(z.sprite,5):''}<div class="ccname">${z?z.name:'No zone'}</div><div class="barwrap"><div class="bar gather" style="width:${S.gatherProgress}%"></div><div class="barlabel">${Math.round(S.gatherProgress)}%</div></div></div></div><div class="small">Gather bonus +${Math.round(gd.gatherPct||0)}% • ${S.gatherer==='player'?'You gather (not fight)':'Gathers while you fight'}</div></div>`; }
function renderPlayerXPCard(){ const xn=xpToNext(S.player.level); const cs=getCombatants(); return `<div class="card"><h3>Your XP — Lv ${S.player.level} (${S.player.class})</h3><div class="barwrap"><div class="bar xp" style="width:${S.player.xp/xn*100}%"></div><div class="barlabel">${Math.floor(S.player.xp)}/${xn}</div></div><div class="grid2 small" style="margin-top:8px;"><div>ATK ${PD.atk}</div><div>DEF ${PD.def}</div><div>Fighters ${cs.length}</div><div>Loot +${Math.round(SHARED.lootPct)}%</div></div></div>`; }
function renderStageCol(){ const col=document.getElementById('stageCol'); if(!col) return; col.innerHTML=renderDungeonStage()+renderGatherCard()+renderPlayerXPCard(); const lb=document.getElementById('logbox'); if(lb) lb.scrollTop=lb.scrollHeight; }
function renderFormation(){ const z=currentDungeonZone(); if(!z||z.type!=='combat') return ''; const active=S.activeRoster||['player']; const chars=active.map(k=>({key:k,nm:charName(k),sp:charSprite(k)})); return `<div class="card"><h3>Dungeon Formation (Active Roster)</h3><p class="small">Front targeted first. Only Active Roster members can deploy. Gatherer excluded.</p><div class="partylist">${chars.map(c=>{ const r=draftRow(c.key); return `<div class="rowitem"><div>${spriteHTML(c.sp,3)}</div><div style="flex:1">${c.nm} ${S.gatherer===c.key?'<span class="small">(gather)</span>':''}</div><button class="tiny ${r==='front'?'':'secondary'}" data-setrow="${c.key}:front">Front</button><button class="tiny ${r==='back'?'':'secondary'}" data-setrow="${c.key}:back">Back</button>${c.key!=='player'?`<button class="tiny ${r==='bench'?'':'secondary'}" data-setrow="${c.key}:bench">Bench</button>`:''}</div>`; }).join('')}</div><button id="btnDeploy" style="margin-top:8px;">DEPLOY</button></div>`; }
const MAP_CELL=140, MAP_PAD=90;
function renderWorldMap(){
  const tiles=visibleTiles();
  const xs=tiles.map(t=>t.x), ys=tiles.map(t=>t.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const w=(maxX-minX)*MAP_CELL+MAP_PAD*2, h=(maxY-minY)*MAP_CELL+MAP_PAD*2;
  const pos=(x,y)=>({x:MAP_PAD+(x-minX)*MAP_CELL, y:MAP_PAD+(y-minY)*MAP_CELL});
  lastMapOriginPos=pos(0,0);
  const tileSet=new Set(tiles.map(t=>t.x+','+t.y));
  let svgLines='';
  tiles.forEach(t=>{ [[1,0],[0,1]].forEach(([dx,dy])=>{ const nx=t.x+dx, ny=t.y+dy; if(!tileSet.has(nx+','+ny)) return; const a=pos(t.x,t.y), b=pos(nx,ny); const un=isPlayable(t.x,t.y)&&isPlayable(nx,ny); svgLines+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${un?'var(--green)':'var(--border)'}" stroke-width="3" stroke-dasharray="${un?'0':'6,6'}"/>`; }); });
  let nodesHtml='';
  tiles.forEach(t=>{ const z=getZoneAt(t.x,t.y); const p=pos(t.x,t.y); const un=isPlayable(t.x,t.y); const cl=S.clearedZones[z.id]; const isPend=(z.type==='combat'&&S.pendingDungeonZone===z.id); const isActive=(z.type==='combat'&&S.dungeonZone===z.id)||(z.type==='gather'&&S.gatherZone===z.id); const isRecruit=z.type==='recruit'; const recUnlocked=isRecruit&&anyBossCleared()&&!S.recruitedNodes?.[z.id]; const nodeCls=`mapNode ${z.type} ${(un&&!isRecruit)?'':(isRecruit&&recUnlocked?'':'locked')} ${isActive?'active':''} ${isPend?'pending':''}`; const label=un?(isRecruit?(recUnlocked?'★ '+z.name:'Needs Boss'):((cl?'✓ ':'')+z.name)):'???'; nodesHtml+=`<div class="${nodeCls}" style="left:${p.x-38}px;top:${p.y-38}px;" data-preview-zone="${z.id}" title="${un?z.name:'Locked'}"><div class="mapNodeIcon">${spriteHTML(z.sprite,3)}</div><div class="mapNodeLabel">${label}</div></div>`; });
  return `<div class="card"><h3>World Map</h3><p class="small">Click a location to preview it, then confirm from the preview. Clearing a location reveals the wilds around it. ${S.pendingDungeonZone?'<span style="color:var(--gold)">Dungeon zone pending — set formation & DEPLOY.</span>':''}</p>
  <div class="small" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px;">
    <span>Seed:</span><input id="seedInput" type="text" value="${S.mapSeed}" style="width:120px;">
    <button class="tiny" data-map-applyseed="1">Set Seed</button>
    <button class="tiny secondary" data-map-randseed="1">Random</button>
    <button class="tiny secondary" data-map-recenter="1">Center</button>
  </div>
  <div class="worldMapWrap" id="worldMapWrap"><div class="worldMapInner" style="width:${w}px;height:${h}px;"><svg class="treeSvg" width="${w}" height="${h}">${svgLines}</svg>${nodesHtml}</div></div></div>`;
}
function renderZones(){ const all=['player',...S.party.map(m=>m.id)]; const gp=all.map(c=>`<div class="rowitem">${spriteHTML(charSprite(c),3)}<div style="flex:1">${charName(c)} ${S.gatherer===c.key?'<span class="small" style="color:var(--green)">→ Gather</span>':''}${S.activeRoster.includes(c)?'':' <span class="small" style="color:var(--dim)">(reserve)</span>'}</div><button class="tiny ${S.gatherer===c.key?'':'secondary'}" data-setgather="${c.key}">${S.gatherer===c.key?'Gathering ✓':'Send'}</button>${S.gatherer===c.key?`<button class="tiny secondary" data-cleargather="1">Recall</button>`:''}</div>`).join(''); return `<div class="layout"><div>${renderWorldMap()}${renderZonePreviewPanel()}<div class="card"><h3>Assign Gatherer</h3><p class="small">One member gathers while rest fight (parallel, even idle).</p><div class="partylist">${gp}</div></div>${renderFormation()}</div><div id="stageCol"></div></div>`; }
function renderInventory(){ return `<div class="card"><h3>Shared Inventory Grid (6×6)</h3><p class="small">Drag to move • materials stack 99 • click book/crystal to use on selected char (or you). Drag gear/material onto the Sell Bin to sell.</p><div class="invgrid" id="invGrid" style="grid-template-columns:repeat(6,1fr);max-width:560px;"></div></div>${renderSellBin()}${renderAutoSell()}`; }
let selectedCell=null;
function renderInventoryGrid(){ const grid=document.getElementById('invGrid'); if(!grid) return; grid.innerHTML=''; S.invGrid.forEach((cell,i)=>{ const sl=document.createElement('div'); sl.className='invslot'; sl.draggable=true; sl.dataset.idx=i; if(!cell) sl.style.opacity=.4; else if(cell.kind==='mat'){ const it=ITEMS[cell.id]; if(!it) sl.style.opacity=.3; else { sl.innerHTML=`<div class="ico">${spriteHTML(it.icon,3)}</div>${it.name}<br><b>${cell.qty}</b>`; if(it.book||it.use) sl.style.borderColor='var(--gold)'; } } else { const inst=S.gearInstances[cell.uid]; if(!inst) sl.style.opacity=.3; else { const lab=gearInstanceLabel(inst); sl.style.borderColor=lab.color; sl.innerHTML=`<div class="ico">${itemIcon(inst.uid,3)}</div><div style="color:${lab.color}">${rarityInfo(inst.rarity).name}</div>${ITEMS[inst.baseId].name}<div class="small">${Object.entries(inst.bonus).map(([k,v])=>`+${v}${k}`).join(' ')}</div>`; } } sl.addEventListener('dragstart',e=>{ dragInProgress=true; e.dataTransfer.setData('text/plain',i); }); sl.addEventListener('dragend',()=>dragInProgress=false); sl.addEventListener('dragover',e=>e.preventDefault()); sl.addEventListener('drop',e=>{ e.preventDefault(); handleGridDrop(parseInt(e.dataTransfer.getData('text/plain')),i); }); sl.addEventListener('click',()=>handleGridClick(i)); grid.appendChild(sl); }); }
function handleGridDrop(s,d){ if(isNaN(s)||s===d) return; const a=S.invGrid[s],b=S.invGrid[d]; if(!a) return; if(!b){ S.invGrid[d]=a; S.invGrid[s]=null; renderInventoryGrid(); return; } if(a.kind==='mat'&&b.kind==='mat'&&a.id===b.id){ const sp=99-b.qty,m=Math.min(sp,a.qty); b.qty+=m; a.qty-=m; if(a.qty<=0) S.invGrid[s]=null; renderInventoryGrid(); return; } S.invGrid[d]=a; S.invGrid[s]=b; renderInventoryGrid(); }
function handleGridClick(i){ const c=S.invGrid[i]; if(c&&c.kind==='mat'&&(ITEMS[c.id].book||ITEMS[c.id].use)){ useConsumable(c.id); return; } if(selectedCell===null){ if(c){ selectedCell=i; toast('Selected — click dest'); } return; } if(selectedCell===i){ selectedCell=null; return; } handleGridDrop(selectedCell,i); selectedCell=null; }
function useConsumable(id){ const it=ITEMS[id]; if(it.book){ useBook(id); return; } if(it.use==='skillpt'){ const k=selectedChar||'player'; const e=charEntity(k); e.skillPts=(e.skillPts||0)+1; gridRemoveMat(id,1); toast(`${charName(k)} +1 skill pt`); renderAll(); return; } }
function useBook(id){ const bk=ITEMS[id].book; const k=selectedChar||'player'; const e=charEntity(k); e.branchLevels[bk]=(e.branchLevels[bk]||0)+1; gridRemoveMat(id,1); recalcAll(); toast(`${charName(k)}: +1 ${bk}`); renderAll(); }
function renderSellBin(){ return `<div class="card"><h3>Sell Bin</h3><p class="small">Drop an item here to sell. Materials open a quantity prompt; gear sells instantly.</p><div class="sellBin" id="sellBin">🪙 DROP TO SELL</div></div>`; }
function renderAutoSell(){
  let rows='';
  for(let i=0;i<5;i++){ const r=(S.autoSell&&S.autoSell[i])||null; const rarOpts=RARITIES.map(ra=>`<option value="${ra.id}" ${r&&r.maxRarity===ra.id?'selected':''}>${ra.name}</option>`).join(''); const itemOpts=Object.entries(ITEMS).filter(([id,it])=>it.slot).map(([id,it])=>`<option value="${id}" ${r&&r.baseId===id?'selected':''}>${it.name}</option>`).join(''); rows+=`<div class="rowitem"><span class="small" style="min-width:42px;">Slot ${i+1}</span><select data-autosell-item="${i}" style="flex:1;max-width:160px;">${itemOpts}</select><span class="small">≤</span><select data-autosell-rar="${i}" style="max-width:110px;">${rarOpts}</select></div>`; }
  return `<div class="card"><h3>Auto-Sell (5 slots)</h3><p class="small">Dropped gear of the chosen type at or below the chosen rarity is auto-sold for gold.</p>${rows}</div>`;
}
function renderCrafting(){ return `<div class="card"><h3>Crafting</h3><p class="small">Gear opens rarity preview + Reroll (10g). Books/Tomes/Crystals instant. Hover a row for details.</p><div class="recipelist">${RECIPES.map(r=>{ const lk=S.player.level<r.lvl; const has=Object.entries(r.need).every(([id,q])=>gridCountMat(id)>=q); const out=ITEMS[r.out]; const tip=`Needs: ${Object.entries(r.need).map(([id,q])=>`${ITEMS[id].name} x${q}`).join(', ')}\n${out.slot?('Produces: '+out.name+' (rarity rolled on craft)'):('Produces: '+out.name+(r.qty>1?(' x'+r.qty):''))}\n${out.book?('Grants: +1 '+out.book+' branch'):out.tome?('Unlocks skill: '+out.tome):out.use?('Grants: +1 skill point'):(out.slot?'Equip in '+out.slot+' slot':'' )}`; return `<div class="rowitem" title="${tip}"><div>${itemIcon(r.out,3)}</div><div style="flex:1"><div>${r.name} ${lk?`<span class="small">(Lv ${r.lvl})</span>`:''}</div><div class="small">${Object.entries(r.need).map(([id,q])=>`${ITEMS[id].name} x${q} (${gridCountMat(id)})`).join(', ')}</div></div><button data-craft="${r.id}" ${lk||!has?'disabled':''}>Craft</button></div>`; }).join('')}</div></div>`; }

/* party */
function rosterCardHTML(k,isP,e){ const pool=isP?null:memberPool(k); const sp=isP?'player':pool.sprite; const nm=isP?'You':pool.name; const hpPct=Math.max(0,e.hp)/e.maxHp*100; const bl=e.branchLevels||{}; return `<div class="rosterCard ${rebornClass(k)}" data-select-char="${k}">${spriteHTML(sp,4)}<div class="info"><div class="cname"><b>${nm}</b> — Lv ${e.level}</div><div class="csub">${e.class}</div><div class="barwrap" style="max-width:200px;"><div class="bar hp" style="width:${hpPct}%"></div><div class="barlabel">${Math.max(0,Math.round(e.hp))}/${e.maxHp}</div></div><div class="small">Branches C:${bl.Combat||0} M:${bl.Magic||0} G:${bl.Gathering||0} • Rebirths:${e.rebirths||0}</div></div></div>`; }
function renderActiveRosterCard(){ const all=['player',...S.party.map(m=>m.id)]; return `<div class="card"><h3>Active Roster (${S.activeRoster.length}/${ACTIVE_CAP})</h3><p class="small">Toggle up to ${ACTIVE_CAP} members deployable in dungeons. Others become reserve (still recruitable/gatherable).</p><div class="partylist">${all.map(k=>{ const on=S.activeRoster.includes(k); return `<div class="rowitem"><div>${spriteHTML(charSprite(k),3)}</div><div style="flex:1">${charName(k)}</div><button class="tiny ${on?'':'secondary'}" data-toggle-active="${k}">${on?'Active ✓':'Reserve'}</button></div>`; }).join('')}</div></div>`; }
function renderPartyRoster(){ const ur=getAllRecruits().slice(0,S.recruitUnlocked); return renderActiveRosterCard()+`<div class="card"><h3>Party — click to manage</h3><div class="partylist">${rosterCardHTML('player',true,S.player)}${S.party.map(m=>rosterCardHTML(m.id,false,m)).join('')}</div></div><div class="card"><h3>Recruit (cap ${PARTY_CAP})</h3><div class="partylist">${ur.filter(p=>!S.party.find(m=>m.id===p.id)).map(p=>`<div class="rowitem"><div>${spriteHTML(p.sprite,3)}</div><div style="flex:1"><div>${p.name} (${p.class})</div><div class="small">ATK ${p.base.atk} DEF ${p.base.def} HP ${p.maxHpBase}</div></div><button data-recruit="${p.id}" ${S.gold<p.cost||S.party.length>=PARTY_CAP?'disabled':''}>${p.cost}g</button></div>`).join('')||'<div class="small">None available.</div>'}</div></div>`; }
function charEntity(k){ return k==='player'?S.player:S.party.find(m=>m.id===k); }
function charName(k){ return k==='player'?'You':memberPool(k).name; }
function charSprite(k){ return k==='player'?'player':memberPool(k).sprite; }
function charDerived(k){ return k==='player'?PD:(MEMBER_DERIVED[k]||{atk:0,def:0,maxHp:0}); }
function renderCharEquip(k){ const e=charEntity(k); const d=charDerived(k); const isP=k==='player'; const gearList=[]; S.invGrid.forEach(c=>{ if(c&&c.kind==='gear'){ const i=S.gearInstances[c.uid]; if(i) gearList.push(i); } }); const sr=isP?[['atk','Attack',2],['def','Defense',2],['mag','Magic',2],['luck','Luck',1],['vit','Vitality',8]]:[['atk','Attack',2],['def','Defense',2],['hp','Max HP',10]]; const alloc=`<div class="card"><h3>Stat Points (${e.statPts||0})</h3><div class="statgrid">${sr.map(([s,l,m])=>`<div>${l} (+${(e.allocated[s]||0)*m})</div><div>${e.allocated[s]||0}</div><button data-alloc-char="${k}:${s}" ${(e.statPts||0)<=0?'disabled':''}>+</button>`).join('')}</div></div>`; const slotIcons={weapon:'sword',armor:'armor',accessory:'ring'}; return `<div class="card"><h3>Stats</h3><div class="grid2 small"><div>ATK ${d.atk}</div><div>DEF ${d.def}</div>${isP?`<div>MAG ${d.mag}</div><div>LUCK ${d.luck}</div>`:`<div>LUCK ${d.luck||0}</div><div></div>`}</div><div class="barwrap" style="margin-top:6px;"><div class="bar hp" style="width:${Math.max(0,e.hp)/e.maxHp*100}%"></div><div class="barlabel">${Math.max(0,Math.round(e.hp))}/${e.maxHp}</div></div></div><div class="card"><h3>Equipment (drag gear here, or click slot)</h3><div class="equipslots">${['weapon','armor','accessory'].map(sl=>{ const u=e.equip[sl]; const inst=u&&S.gearInstances[u]; const lab=inst?gearInstanceLabel(inst):null; return `<div class="eqslot" data-equipslot="${k}:${sl}" style="${inst?`border-color:${lab.color}`:''}"><div class="ico">${inst?itemIcon(inst.uid,3):spriteHTML(slotIcons[sl],3)}</div>${inst?`<div style="color:${lab.color};font-size:9px;">${lab.name}</div>`:sl}</div>`; }).join('')}</div><div style="margin-bottom:6px;"><button class="tiny" data-equipbest="${k}">Equip Best (all slots)</button></div><div class="eqOptions">${gearList.length?gearList.map(inst=>{ const lab=gearInstanceLabel(inst); return `<button class="secondary tiny" style="border-color:${lab.color}" data-char-equip="${k}:${inst.uid}"><span style="display:inline-flex;vertical-align:middle;margin-right:4px;">${itemIcon(inst.uid,2)}</span>Equip ${lab.name} (${Object.entries(inst.bonus).map(([x,v])=>`+${v}${x}`).join(' ')})</button>`; }).join(''):'<span class="small">No spare gear in grid.</span>'}</div></div>${alloc}`; }
function renderCharSkills(k){ const e=charEntity(k); const maxCol=Math.max(...SKILL_TREE.map(n=>n.col)); const maxRow=Math.max(...SKILL_TREE.map(n=>n.row)); const COLW=112,ROWH=98,NW=92,NH=74,PAD=16; const w=PAD*2+(maxCol+1)*COLW,h=PAD*2+(maxRow+1)*ROWH; const ctr=n=>({x:PAD+n.col*COLW+NW/2,y:PAD+n.row*ROWH+NH/2}); let lines=''; SKILL_TREE.forEach(n=>{ (n.pre||[]).forEach(pid=>{ const p=SKILL_TREE.find(x=>x.id===pid); if(!p) return; const a=ctr(p),b=ctr(n); lines+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${e.skills[n.id]?'#4fbf5b':'#4a3d6b'}" stroke-width="3"/>`; }); }); let nodes=''; SKILL_TREE.forEach(n=>{ const un=!!e.skills[n.id]; const av=!n.requiresTome&&!un&&(n.pre||[]).every(p=>e.skills[p])&&e.skillPts>=n.cost; const ta=n.requiresTome&&!un&&Object.entries(ITEMS).some(([id,it])=>it.tome===n.requiresTome&&gridCountMat(id)>0); const pos={left:PAD+n.col*COLW,top:PAD+n.row*ROWH}; const sc=un?'unlocked':(n.requiresTome?'locked tome':(av?'available':'locked')); const tag=n.branch==='Sub'?`<span class="branchtag Sub">${n.sub}</span>`:`<span class="branchtag ${n.branch}">${n.branch}</span>`; nodes+=`<div class="skillNode ${sc}" style="left:${pos.left}px;top:${pos.top}px;" data-skill-char="${k}:${n.id}">${tag}<div class="nname">${n.name}${un?' ✔':''}</div><div class="cost">${n.requiresTome?(un?'':(ta?'Use Tome →':'needs Tome')):('Cost '+n.cost)}</div></div>`; }); return `<div class="card"><h3>${charName(k)} Skill Tree (${e.skillPts} pts) — ${e.class}</h3><p class="small">${classBreakdownFor(e.skills)}. Books give branch levels; Tomes unlock dashed nodes.</p><div class="treeWrap"><div class="treeInner" style="width:${w}px;height:${h}px;"><svg class="treeSvg" width="${w}" height="${h}">${lines}</svg>${nodes}</div></div></div>`; }
function renderCharPrestige(k){ const e=charEntity(k); const can=e.level>=15; const gain=Math.floor(Math.pow(e.level,0.8)); return `<div class="card"><h3>${charName(k)} Rebirth</h3><p class="small">Resets level/XP/skills/stats; gear→grid; grants Essence. Reborn chars show gold aura.</p><p>Gain <b>${gain}</b> Essence ${can?'':'(Lv15+)'}.</p><button data-rebirth="${k}" ${can?'':'disabled'}>Rebirth</button></div><div class="card"><h3>Prestige (${e.essence||0} Essence)</h3><p class="small">How it works: Reach Lv 15, then <b>Rebirth</b> to reset level/skills but gain <b>Essence</b> (= floor(Lv^0.8)). Spend Essence below on <b>permanent</b> bonuses that persist through all future rebirths. Rebirth multiple times to stack the gold aura and bonuses.</p><div class="skilllist">${PRESTIGE_TREE.map(n=>{ const rk=e.prestigeRanks[n.id]||0; const cost=n.baseCost*(rk+1); const mx=rk>=n.maxRank; return `<div style="border:1px solid var(--border);border-radius:6px;padding:8px;background:var(--panel2);"><span class="branchtag Prestige">Prestige</span> <b>${n.name}</b> (${rk}/${n.maxRank})<div class="small">${n.desc}</div>${!mx?`<button data-prestige-char="${k}:${n.id}" ${(e.essence||0)<cost?'disabled':''}>${cost} Ess</button>`:'<span class="small">MAX</span>'}</div>`; }).join('')}</div></div>`; }
function renderCharacterPanel(k){ const e=charEntity(k); if(!e){ selectedChar=null; return renderPartyRoster(); } const xn=xpToNext(e.level); const subs=[{id:'equip',l:'Equip & Stats'},{id:'skills',l:'Skill Tree'},{id:'prestige',l:'Prestige'}]; let body=charTab==='equip'?renderCharEquip(k):charTab==='skills'?renderCharSkills(k):renderCharPrestige(k); return `<div class="card"><button class="secondary" data-back-roster="1">← Back</button><div class="charHeader" style="margin-top:10px;">${spriteHTML(charSprite(k),5)}<div class="info"><div class="charTitle">${charName(k)} — Lv ${e.level}</div><div class="charClass">${e.class}${e.rebirths>0?` 👑${e.rebirths}`:''}</div><div class="barwrap" style="max-width:260px;"><div class="bar xp" style="width:${e.xp/xn*100}%"></div><div class="barlabel">${Math.floor(e.xp)}/${xn}</div></div></div></div><div class="subtabs">${subs.map(t=>`<div class="subtab ${charTab===t.id?'active':''}" data-chartab="${t.id}">${t.l}</div>`).join('')}</div></div>${body}`; }

function rebirth(k){ const isP=k==='player'; const e=charEntity(k); if(!e||e.level<15) return; const gain=Math.floor(Math.pow(e.level,0.8)); ['weapon','armor','accessory'].forEach(sl=>{ if(e.equip[sl]){ gridAddGear(e.equip[sl]); e.equip[sl]=null; } }); const ke=e.essence||0, kr=e.prestigeRanks, kb=e.branchLevels; if(isP) Object.assign(e,freshPlayerState()); else Object.assign(e,freshMemberState(k)); e.essence=ke; e.prestigeRanks=kr; e.branchLevels=kb; e.rebirths=(e.rebirths||0)+1; recalcAll(); toast(`${charName(k)} reborn! +${gain} Ess`); }
function toggleActive(k){ if(k==='player'){ toast('You are always active'); return; } const i=S.activeRoster.indexOf(k); if(i>=0){ S.activeRoster.splice(i,1); S.deployment.front=S.deployment.front.filter(x=>x!==k); S.deployment.back=S.deployment.back.filter(x=>x!==k); if(S.gatherer===k) S.gatherer=null; toast(`${charName(k)} → Reserve`); } else { if(S.activeRoster.length>=ACTIVE_CAP){ toast(`Active full (${ACTIVE_CAP})`); return; } S.activeRoster.push(k); S.deployment.back.push(k); toast(`${charName(k)} → Active`); } pendingDeployment=null; renderAll(); }
let mapDragState={down:false,startX:0,startY:0,startScrollX:0,startScrollY:0,moved:false};
let mapScroll=null;
let lastMapOriginPos=null;
function centerMapOnOrigin(wrap){ if(!wrap||!lastMapOriginPos) return; wrap.scrollLeft=lastMapOriginPos.x-wrap.clientWidth/2; wrap.scrollTop=lastMapOriginPos.y-wrap.clientHeight/2; mapScroll={left:wrap.scrollLeft,top:wrap.scrollTop}; }
function bindWorldMapDrag(){ const wrap=document.getElementById('worldMapWrap'); if(!wrap) return;
  if(mapScroll){ wrap.scrollLeft=mapScroll.left; wrap.scrollTop=mapScroll.top; } else centerMapOnOrigin(wrap);
  wrap.onscroll=()=>{ mapScroll={left:wrap.scrollLeft,top:wrap.scrollTop}; };
  wrap.onmousedown=e=>{ mapDragState.down=true; mapDragState.moved=false; mapDragState.startX=e.pageX; mapDragState.startY=e.pageY; mapDragState.startScrollX=wrap.scrollLeft; mapDragState.startScrollY=wrap.scrollTop; };
  wrap.ontouchstart=e=>{ mapDragState.down=true; mapDragState.moved=false; mapDragState.startX=e.touches[0].pageX; mapDragState.startY=e.touches[0].pageY; mapDragState.startScrollX=wrap.scrollLeft; mapDragState.startScrollY=wrap.scrollTop; };
}
if(!window._mapDragGlobalBound){ window._mapDragGlobalBound=true;
  window.addEventListener('mousemove',e=>{ if(!mapDragState.down) return; const wrap=document.getElementById('worldMapWrap'); if(!wrap) return; const dx=e.pageX-mapDragState.startX, dy=e.pageY-mapDragState.startY; if(Math.abs(dx)>5||Math.abs(dy)>5) mapDragState.moved=true; wrap.scrollLeft=mapDragState.startScrollX-dx; wrap.scrollTop=mapDragState.startScrollY-dy; });
  window.addEventListener('mouseup',()=>{ mapDragState.down=false; });
  window.addEventListener('touchmove',e=>{ if(!mapDragState.down) return; const wrap=document.getElementById('worldMapWrap'); if(!wrap) return; const dx=e.touches[0].pageX-mapDragState.startX, dy=e.touches[0].pageY-mapDragState.startY; if(Math.abs(dx)>5||Math.abs(dy)>5) mapDragState.moved=true; wrap.scrollLeft=mapDragState.startScrollX-dx; wrap.scrollTop=mapDragState.startScrollY-dy; },{passive:true});
  window.addEventListener('touchend',()=>{ mapDragState.down=false; });
}
function bindEvents(){
  bindWorldMapDrag();

  const randSeedBtn=document.querySelector('[data-map-randseed]'); if(randSeedBtn) randSeedBtn.onclick=()=>{ if(!confirm('Generate a brand-new random world? This resets your explored map (cleared zones) but keeps your character, gold, gear & party.')) return; regenerateWorldMap(Math.floor(Math.random()*4294967295)); renderAll(); };
  const recenterBtn=document.querySelector('[data-map-recenter]'); if(recenterBtn) recenterBtn.onclick=()=>centerMapOnOrigin(document.getElementById('worldMapWrap'));
  document.querySelectorAll('[data-preview-deploy]').forEach(el=>el.onclick=()=>{ S.pendingDungeonZone=el.dataset.previewDeploy; previewZoneId=null; toast('Zone queued — set formation & DEPLOY'); renderAll(); });

  const bd=document.getElementById('btnDeploy'); if(bd) bd.onclick=()=>{ ensurePending(); S.deployment=JSON.parse(JSON.stringify(pendingDeployment)); if(S.pendingDungeonZone){ S.dungeonZone=S.pendingDungeonZone; S.pendingDungeonZone=null; S.monsterGroup=[]; } toast('Deployed!'); renderAll(); };
  document.querySelectorAll('[data-setgather]').forEach(el=>el.onclick=()=>{ S.gatherer=el.dataset.setgather; toast(`${charName(S.gatherer)} gathers`); renderAll(); });

  document.querySelectorAll('[data-select-char]').forEach(el=>el.onclick=()=>{ selectedChar=el.dataset.selectChar; charTab='equip'; renderAll(); });
  document.querySelectorAll('[data-back-roster]').forEach(el=>el.onclick=()=>{ selectedChar=null; renderAll(); });
  document.querySelectorAll('[data-chartab]').forEach(el=>el.onclick=()=>{ charTab=el.dataset.chartab; renderAll(); });
  document.querySelectorAll('[data-char-equip]').forEach(el=>el.onclick=()=>{ const [k,u]=el.dataset.charEquip.split(':'); const e=charEntity(k); const inst=S.gearInstances[u]; if(!e||!inst||!gridHasGear(u)) return; gridRemoveGear(u); const base=ITEMS[inst.baseId]; if(e.equip[base.slot]) gridAddGear(e.equip[base.slot]); e.equip[base.slot]=u; recalcAll(); renderAll(); });
  document.querySelectorAll('[data-char-unequip]').forEach(el=>el.onclick=()=>{ const [k,sl]=el.dataset.charUnequip.split(':'); const e=charEntity(k); if(!e||!e.equip[sl]) return; gridAddGear(e.equip[sl]); e.equip[sl]=null; recalcAll(); renderAll(); });
  document.querySelectorAll('[data-equipslot]').forEach(el=>el.onclick=()=>{ const [k,sl]=el.dataset.equipslot.split(':'); openEquipModal(k,sl); });
  document.querySelectorAll('[data-equipbest]').forEach(el=>el.onclick=()=>{ const k=el.dataset.equipbest; const e=charEntity(k); const owned=[]; S.invGrid.forEach(c=>{ if(c&&c.kind==='gear'){ const i=S.gearInstances[c.uid]; if(i) owned.push(i); } }); const sum=i=>Object.values(i.bonus).reduce((a,b)=>a+b,0); ['weapon','armor','accessory'].forEach(sl=>{ const opt=owned.filter(i=>ITEMS[i.baseId].slot===sl&&gridHasGear(i.uid)); if(!opt.length) return; const best=opt.sort((a,b)=>sum(b)-sum(a))[0]; if(e.equip[sl]) gridAddGear(e.equip[sl]); gridRemoveGear(best.uid); e.equip[sl]=best.uid; }); recalcAll(); renderAll(); toast('Best equipped'); });
  document.querySelectorAll('[data-alloc-char]').forEach(el=>el.onclick=()=>{ const [k,s]=el.dataset.allocChar.split(':'); const e=charEntity(k); if(!e||(e.statPts||0)<=0) return; e.statPts--; e.allocated[s]=(e.allocated[s]||0)+1; recalcAll(); renderAll(); });
  document.querySelectorAll('[data-skill-char]').forEach(el=>el.onclick=()=>{ const [k,nid]=el.dataset.skillChar.split(':'); const e=charEntity(k); const n=SKILL_TREE.find(x=>x.id===nid); if(!e||!n) return; if(n.requiresTome){ if(e.skills[n.id]) return; const te=Object.entries(ITEMS).find(([id,it])=>it.tome===n.requiresTome&&gridCountMat(id)>0); if(!te){ toast('Craft Tome'); return; } gridRemoveMat(te[0],1); e.skills[n.id]=true; toast(`${n.name} unlocked`); } else { if(e.skillPts<n.cost||!n.pre.every(p=>e.skills[p])) return; e.skillPts-=n.cost; e.skills[n.id]=true; } recalcAll(); renderAll(); });
  document.querySelectorAll('[data-prestige-char]').forEach(el=>el.onclick=()=>{ const [k,nid]=el.dataset.prestigeChar.split(':'); const e=charEntity(k); const n=PRESTIGE_TREE.find(x=>x.id===nid); if(!e||!n) return; const rk=e.prestigeRanks[n.id]||0; const cost=n.baseCost*(rk+1); if((e.essence||0)<cost||rk>=n.maxRank) return; e.essence-=cost; e.prestigeRanks[n.id]=rk+1; recalcAll(); renderAll(); });
  document.querySelectorAll('[data-rebirth]').forEach(el=>el.onclick=()=>{ rebirth(el.dataset.rebirth); renderAll(); });
  document.querySelectorAll('[data-save-to]').forEach(el=>el.onclick=()=>{ const i=el.dataset.saveTo; const snap=JSON.parse(JSON.stringify(S)); snap.__savedAt=Date.now(); try{ localStorage.setItem(slotKey(i),JSON.stringify(snap)); toast(`Saved ${i}`); }catch(e){ toast('Fail'); } renderAll(); });
  document.querySelectorAll('[data-load-from]').forEach(el=>el.onclick=()=>{ const i=el.dataset.loadFrom; const sl=readSlot(i); if(!sl) return; delete sl.__savedAt; S=normalizeState(sl); selectedChar=null; currentTab='zones'; pendingDeployment=null; autosaveSuspended=false; recalcAll(); save(); toast(`Loaded ${i}`); renderAll(); });
  document.querySelectorAll('[data-delete-slot]').forEach(el=>el.onclick=()=>{ localStorage.removeItem(slotKey(el.dataset.deleteSlot)); toast('Deleted'); renderAll(); });
  document.querySelectorAll('[data-load-auto]').forEach(el=>el.onclick=()=>{ const raw=localStorage.getItem(SAVE_KEY); if(!raw) return; S=normalizeState(JSON.parse(raw)); selectedChar=null; pendingDeployment=null; autosaveSuspended=false; recalcAll(); toast('Loaded autosave'); renderAll(); });
  document.querySelectorAll('[data-clear-auto]').forEach(el=>el.onclick=()=>{ localStorage.removeItem(SAVE_KEY); autosaveSuspended=true; document.getElementById('saveStatus').textContent='Autosave cleared (paused)'; document.getElementById('btnPause').textContent='▶ Resume Save'; toast('Autosave cleared — saving paused'); });
  document.querySelectorAll('[data-equip-uid]').forEach(el=>el.onclick=()=>{ if(!equipModalCtx) return; const {k,sl}=equipModalCtx; const u=el.dataset.equipUid; const e=charEntity(k); const inst=S.gearInstances[u]; if(!e||!inst||!gridHasGear(u)) return; gridRemoveGear(u); if(e.equip[sl]) gridAddGear(e.equip[sl]); e.equip[sl]=u; recalcAll(); document.getElementById('equipModal').style.display='none'; equipModalCtx=null; renderAll(); });
  document.querySelectorAll('[data-equipslot]').forEach(el=>{ el.addEventListener('dragover',e=>e.preventDefault()); el.addEventListener('drop',e=>{ e.preventDefault(); const idx=parseInt(e.dataTransfer.getData('text/plain')); const cell=S.invGrid[idx]; if(cell&&cell.kind==='gear'){ const [k,sl]=el.dataset.equipslot.split(':'); const e2=charEntity(k); const inst=S.gearInstances[cell.uid]; if(inst&&ITEMS[inst.baseId].slot===sl){ gridRemoveGear(cell.uid); if(e2.equip[sl]) gridAddGear(e2.equip[sl]); e2.equip[sl]=cell.uid; recalcAll(); renderAll(); } } }); });
  document.querySelectorAll('[data-autosell-item]').forEach(el=>el.onchange=()=>{ const i=+el.dataset.autosellItem; const v=el.value; const rarSel=document.querySelector(`[data-autosell-rar="${i}"]`); if(!S.autoSell) S.autoSell=new Array(5).fill(null); if(!v){ S.autoSell[i]=null; } else { S.autoSell[i]={baseId:v,maxRarity:rarSel?rarSel.value:'common'}; } renderAll(); });
  document.querySelectorAll('[data-autosell-rar]').forEach(el=>el.onchange=()=>{ const i=+el.dataset.autosellRar; const itemSel=document.querySelector(`[data-autosell-item="${i}"]`); if(!S.autoSell) S.autoSell=new Array(5).fill(null); if(itemSel&&itemSel.value){ S.autoSell[i]={baseId:itemSel.value,maxRarity:el.value}; } });
  const sb=document.getElementById('sellBin'); if(sb){ sb.addEventListener('dragover',e=>{ e.preventDefault(); sb.classList.add('dragover'); }); sb.addEventListener('dragleave',()=>sb.classList.remove('dragover')); sb.addEventListener('drop',e=>{ e.preventDefault(); sb.classList.remove('dragover'); handleSellDrop(parseInt(e.dataTransfer.getData('text/plain'))); }); }
}
runOffline();
renderAll();
</script>
</body>
</html>
