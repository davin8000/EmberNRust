<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ember & Rust — AFK Idle RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14101c; --panel:#1e1830; --panel2:#271f3d; --border:#4a3d6b;
  --gold:#e8c158; --hp:#c23b3b; --xp:#4d9de0; --mp:#7b3fbf;
  --text:#e9e1f5; --dim:#9186ab; --green:#4fbf5b; --accent:#e07a3f;
}
*{box-sizing:border-box;}
body{margin:0; background:radial-gradient(ellipse at top,#241a38,#0e0b16 70%); color:var(--text); font-family:'VT323',monospace; font-size:18px; min-height:100vh;}
h1,h2,h3,.pixel{font-family:'Press Start 2P',monospace;}
#app{max-width:1200px;margin:0 auto;padding:10px;}
header{display:flex; justify-content:space-between; align-items:center; gap:10px; background:var(--panel); border:2px solid var(--border); border-radius:6px; padding:10px 14px; margin-bottom:8px; flex-wrap:wrap;}
header h1{font-size:13px;color:var(--accent);margin:0;letter-spacing:1px;}
.hstats{display:flex;gap:16px;flex-wrap:wrap;font-size:20px;}
.hstats span b{color:var(--gold);}
.saveStatus{font-size:13px;color:var(--dim);}
select{font-family:'VT323',monospace;font-size:15px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;cursor:pointer;}
select:focus{outline:none;border-color:var(--accent);}
input[type=text],input[type=number]{font-family:'VT323',monospace;font-size:15px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px;}
.sellBin{margin-top:6px;min-height:60px;border:2px dashed var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P';font-size:10px;color:var(--gold);background:rgba(232,193,88,.06);}
.sellBin.dragover{border-color:var(--green);background:rgba(79,191,91,.12);}
.tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.tab{background:var(--panel2); border:2px solid var(--border); color:var(--dim); padding:8px 12px; cursor:pointer; border-radius:4px 4px 0 0; font-family:'Press Start 2P'; font-size:10px;}
.tab.active{background:var(--accent); color:#1a1220; border-color:var(--accent);}
.subtabs{display:flex;gap:4px;margin:8px 0;flex-wrap:wrap;}
.subtab{background:var(--panel2); border:1px solid var(--border); color:var(--dim); padding:6px 10px; cursor:pointer; border-radius:4px; font-size:13px;}
.subtab.active{background:var(--green); color:#0d2b12; border-color:var(--green);}
.subtab.locked{opacity:.4;cursor:not-allowed;}
.layout{display:flex; flex-wrap:wrap; align-items:flex-start; gap:8px;}
.layout > div{flex:1; min-width:320px;}
.card{background:var(--panel); border:2px solid var(--border); border-radius:6px; padding:12px; margin-bottom:8px;}
.card h3{margin:0 0 8px 0; font-size:11px; color:var(--accent);}
.card.collapsible > h3{cursor:pointer; user-select:none; display:flex; align-items:center; gap:6px;}
.card.collapsible > h3::before{content:'▾'; font-size:10px; color:var(--dim);}
.card.collapsible.collapsed > h3::before{content:'▸';}
.card.collapsible.collapsed > *:not(h3){display:none;}
.card.collapsible.collapsed{min-height:0 !important; height:auto !important;}
.barwrap{background:#0b0812; border:1px solid var(--border); border-radius:4px; height:16px; overflow:hidden; position:relative; margin:4px 0;}
.bar{height:100%; transition:width .25s;}
.bar.hp{background:linear-gradient(90deg,#8f1f1f,var(--hp));}
.bar.enemyhp{background:linear-gradient(90deg,#8f1f1f,#e0553f);}
.bar.xp{background:linear-gradient(90deg,#2c6a9e,var(--xp));}
.bar.gather{background:linear-gradient(90deg,#2c8a3e,var(--green));}
.bar.mp{background:linear-gradient(90deg,#5a2f8a,var(--mp));}
.barlabel{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; text-shadow:1px 1px #000;}
.stage{background:linear-gradient(#241c38,#161022); border:2px solid var(--border); border-radius:6px; min-height:200px; padding:14px; position:relative; overflow:hidden; display:flex; flex-direction:column; gap:10px;}
.battlerow{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.partyrow{display:flex; gap:8px; flex-wrap:wrap; flex:1;}
.ccard{background:#1b1428; border:1px solid var(--border); border-radius:6px; padding:6px; width:92px; text-align:center; position:relative;}
.ccard.downed{opacity:.4;}
.ccard .sprite-box{margin:0 auto;}
.ccname{font-size:11px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.rowbadge{position:absolute; top:2px; right:4px; font-size:9px; font-family:'Press Start 2P'; color:var(--gold);}
.miniHp{background:#0b0812;border:1px solid var(--border);border-radius:3px;height:8px;margin-top:3px;overflow:hidden;}
.miniHpFill{height:100%;background:linear-gradient(90deg,#8f1f1f,var(--hp));}
.miniMp{background:#0b0812;border:1px solid var(--border);border-radius:3px;height:6px;margin-top:2px;overflow:hidden;}
.miniMpFill{height:100%;background:linear-gradient(90deg,#5a2f8a,var(--mp));}
.vsdivider{font-family:'Press Start 2P'; color:var(--accent); font-size:13px; text-align:center;}
.monsterbox{text-align:center; min-width:150px;}
.monsterbox .sprite-box{margin:0 auto;}
.gatherbox{text-align:center; min-width:150px;}
@keyframes idlebob{0%{transform:translateY(0)}50%{transform:translateY(-2px)}100%{transform:translateY(0)}}
@keyframes tierAura{0%{box-shadow:0 0 4px var(--rt-color, var(--gold))}50%{box-shadow:0 0 12px var(--rt-color, var(--gold))}100%{box-shadow:0 0 4px var(--rt-color, var(--gold))}}
@keyframes mythicAura{0%{box-shadow:0 0 8px #ff5e5e}20%{box-shadow:0 0 10px #ffcf5e}40%{box-shadow:0 0 10px #6dff8a}60%{box-shadow:0 0 10px #5ecbff}80%{box-shadow:0 0 10px #b35eff}100%{box-shadow:0 0 8px #ff5e5e}}
.idle .sprite-box{animation:idlebob 2s ease-in-out infinite;}
.reborn .sprite-box{animation:tierAura 2.5s ease-in-out infinite; border-radius:4px;}
.reborn-mythic .sprite-box{animation:mythicAura 2.4s linear infinite; border-radius:4px;}
.rowitem.unit-deployed{border-color:var(--green); box-shadow:inset 0 0 0 1px var(--green);}
.sprite-box{position:relative; image-rendering:pixelated;}
.pixel-sprite{position:absolute; left:0; top:0;}
.floattext{position:absolute; font-family:'Press Start 2P'; font-size:10px; color:#ff6b6b; animation:floatup 1s forwards; pointer-events:none; left:50%; top:0;}
.floattext.heal{color:#6bff8f;}
.floattext.info{color:var(--gold);}
@keyframes floatup{0%{opacity:1; transform:translate(-50%,0)}100%{opacity:0; transform:translate(-50%,-36px)}}
.log{background:#0b0812; border:1px solid var(--border); border-radius:4px; height:100px; overflow-y:auto; padding:6px 8px; font-size:15px; scrollbar-width:none; -ms-overflow-style:none;}
.log::-webkit-scrollbar{display:none;}
.log div{opacity:.85;}
.log div:last-child{opacity:1;color:var(--gold);}
.zonelist,.itemlist,.recipelist,.partylist,.skilllist{display:flex; flex-direction:column; gap:6px; max-height:520px; overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none;}
.zonelist::-webkit-scrollbar,.itemlist::-webkit-scrollbar,.recipelist::-webkit-scrollbar,.partylist::-webkit-scrollbar,.skilllist::-webkit-scrollbar{display:none;}
.zonebtn,.rowitem{background:var(--panel2); border:1px solid var(--border); border-radius:4px; padding:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px;}
.zonebtn:hover,.rowitem:hover{border-color:var(--accent);}
.small{font-size:13px; color:var(--dim);}
button{font-family:'VT323',monospace; font-size:16px; background:var(--accent); color:#1a1220; border:none; border-radius:4px; padding:6px 10px; cursor:pointer;}
button:disabled{background:#4a3d6b; color:var(--dim); cursor:not-allowed;}
button.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--border);}
button.tiny{font-size:12px; padding:3px 7px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
.invgrid{display:grid; grid-template-columns:repeat(10,1fr); gap:6px;}
.invslot{background:var(--panel2); border:1px solid var(--border); border-radius:4px; padding:4px; text-align:center; font-size:11px; cursor:grab; min-height:54px; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.invslot:active{cursor:grabbing;}
.invslot .ico{display:flex; justify-content:center; margin-bottom:2px;}
.equipslots{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
.eqslot{background:var(--panel2); border:1px dashed var(--border); border-radius:4px; width:70px; height:70px; display:flex; align-items:center; justify-content:center; flex-direction:column; font-size:9px; text-align:center; position:relative; cursor:pointer;}
.eqslot.dragover{border-color:var(--green);}
.statgrid{display:grid; grid-template-columns:1fr auto auto; gap:4px 10px; align-items:center; font-size:16px;}
.rosterCard{background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:10px; display:flex; align-items:center; gap:10px; cursor:pointer;}
.rosterCard:hover{border-color:var(--accent);}
.rosterCard .info{flex:1;}
.rosterCard .cname{font-size:15px;}
.rosterCard .csub{font-size:12px;color:var(--green);font-family:'Press Start 2P';}
.charHeader{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
.charHeader .info{flex:1;}
.charTitle{font-size:13px;font-family:'Press Start 2P';color:var(--accent);}
.charClass{font-size:12px;color:var(--green);font-family:'Press Start 2P';margin-top:2px;}
.treeWrap{position:relative; overflow-x:auto; padding:10px 0;}
.treeInner{position:relative;}
.skillNode{position:absolute; width:92px; height:74px; background:var(--panel2); border:2px solid var(--border); border-radius:6px; padding:4px; text-align:center; font-size:10px; z-index:1; cursor:pointer; display:flex; flex-direction:column; justify-content:center; gap:2px;}
.skillNode.unlocked{border-color:var(--green); box-shadow:0 0 8px rgba(79,191,91,.5);}
.skillNode.available{border-color:var(--gold); box-shadow:0 0 6px rgba(232,193,88,.4);}
.skillNode.locked{opacity:.5;}
.skillNode.tome{border-style:dashed;}
.skillNode .cost{font-size:9px;color:var(--gold);}
.branchtag{font-size:8px; padding:1px 4px; border-radius:3px; font-family:'Press Start 2P'; align-self:center;}
.branchtag.Combat{background:#5a1f1f;color:#ffb3b3;}
.branchtag.Magic{background:#2f1f5a;color:#c9b3ff;}
.branchtag.Gathering{background:#1f5a2b;color:#b3ffc0;}
.branchtag.Prestige{background:#5a4b1f;color:#ffe6b3;}
.branchtag.Sub{background:#3a3a45;color:#ddd;}
.branchtag.Special{background:#7a2f5a;color:#ffc9ef;}
.treeSvg{position:absolute; top:0; left:0; z-index:0; pointer-events:none;}
footer{text-align:center; color:var(--dim); font-size:13px; padding:14px 0;}
.toast{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--panel); border:2px solid var(--accent); padding:8px 16px; border-radius:6px; font-size:15px; z-index:50;}
#craftModal,#equipModal,#sellModal,#tomeModal,#specialModal,#confirmModal{display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; align-items:center; justify-content:center;}
#craftModal > div,#equipModal > div,#sellModal > div,#tomeModal > div,#specialModal > div,#confirmModal > div{background:var(--panel); border:2px solid var(--accent); border-radius:8px; padding:16px; max-width:420px; text-align:center;}
.worldMapWrap{overflow:auto; height:480px; max-height:70vh; border:1px solid var(--border); border-radius:6px; background:radial-gradient(ellipse at top,#241c38,#120d1c 75%); cursor:grab; user-select:none; scrollbar-width:none; -ms-overflow-style:none;}
.worldMapWrap::-webkit-scrollbar{display:none;}
.worldMapInner{position:relative;}
.mapNode{position:absolute; width:76px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:5px 4px; border-radius:8px; border:2px solid var(--border); background:rgba(30,24,48,.9); text-align:center;}
.mapNode:hover{border-color:var(--accent);}
.mapNode.active{border-color:var(--gold); box-shadow:0 0 8px rgba(232,193,88,.5);}
.mapNode.deployed{font-weight:bold; border-width:3px;}
.mapNode.cleared{box-shadow:0 0 6px rgba(79,191,91,.4);}
.mapNode.locked{opacity:.4; cursor:not-allowed;}
.mapNode.upcoming{filter:grayscale(0.85); opacity:.5;}
.mapNode.combat{border-color:#8a3535;}
.mapNode.gather{border-color:#2f6a3f;}
.mapNode.recruit{border-color:#c9a12e;}
.mapNode.combat.active,.mapNode.gather.active{border-color:var(--gold);}
.mapNode.dragover{border-color:var(--green); box-shadow:0 0 8px rgba(79,191,91,.6); background:rgba(79,191,91,.12);}
.mapNode.markHighlight{border-color:var(--gold); animation:markPulse 1.6s ease-in-out infinite;}
.mapNode.viewcenter{outline:2px dashed var(--accent); outline-offset:2px;}
@keyframes markPulse{0%,100%{box-shadow:0 0 6px 1px rgba(232,193,88,.5);}50%{box-shadow:0 0 14px 4px rgba(232,193,88,.9);}}
.mapNodeLabel{font-size:9px; line-height:1.25;}
.floorListWrap{max-height:520px; overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none;}
.floorListWrap::-webkit-scrollbar{display:none;}
.contGrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:8px 0;}
.contCell{background:var(--panel2); border:2px solid var(--border); border-radius:8px; padding:10px; text-align:center; cursor:pointer;}
.contCell.visited:hover{border-color:var(--accent);}
.contCell.locked{cursor:not-allowed; opacity:.5;}
.contCell.current{border-color:var(--gold); box-shadow:0 0 8px rgba(232,193,88,.4);}
.contName{font-size:11px; margin-top:4px;}
.rankBadge{font-family:'Press Start 2P'; font-size:9px; margin-left:4px;}
.minimap{position:relative; width:110px; height:110px; border:1px solid var(--border); border-radius:6px; background:rgba(0,0,0,.3); flex-shrink:0; margin-left:10px; overflow:hidden;}
.miniDot{position:absolute; width:6px; height:6px; margin:-3px; border-radius:50%; background:var(--dim);}
.miniOrigin{position:absolute; width:6px; height:6px; margin:-3px; border-radius:2px; background:var(--green);}
.miniBoundary{position:absolute; border:1px dashed var(--dim); border-radius:3px; pointer-events:none;}
.miniArrow{position:absolute; width:0; height:0; border-left:8px solid var(--accent); border-top:4px solid transparent; border-bottom:4px solid transparent; margin-left:-2px; margin-top:-4px; transform-origin:0 0; transition:opacity .3s;}
.miniView{position:absolute; border:1px dashed var(--accent); pointer-events:none; transition:left .15s,top .15s,width .15s,height .15s;}
[data-dragunit]{cursor:grab;}
.formrows{display:flex; flex-direction:column; gap:8px;}
.formrow{border:1px dashed var(--border); border-radius:6px; padding:8px; transition:border-color .15s,background .15s;}
.formrow.dragover{border-color:var(--green); background:rgba(79,191,91,.08);}
.formrow-label{color:var(--dim); letter-spacing:1px; margin-bottom:6px;}
.formrow-chips{display:flex; flex-direction:column; gap:4px; margin-bottom:6px;}
.formrow-hint{opacity:.5; padding:4px 0;}
.monstergroup{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; min-width:150px;}
.equipRow{display:flex; justify-content:space-between; align-items:center; gap:8px; padding:6px; border:1px solid var(--border); border-radius:4px; margin-bottom:4px; cursor:pointer;}
.equipRow:hover{border-color:var(--green);}
.craftFilterBar{display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:8px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⚔ EMBER & RUST</h1>
    <div class="hstats">
      <span>💰 <b id="hGold">0</b></span>
      <span>Floor <b id="hFloor">1</b></span>
      <span>Active: <b id="hPartySize">0</b></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="btnPause" class="tiny">⏸ Pause Save</button>
      <div class="saveStatus" id="saveStatus">Autosave: —</div>
    </div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div id="tabContent"></div>
  <footer>Autosaves every 4s • drag a roster unit onto a map node or formation row to deploy • units deploy to ONE node only • clear a floor BOSS to ascend</footer>
</div>
<div id="toastHolder"></div>
<div id="craftModal"><div>
  <div id="craftModalBody"></div>
  <div style="margin-top:12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
    <button id="craftTake">Take</button>
    <button id="craftReroll" class="secondary">Reroll (10g)</button>
    <button id="craftCancel" class="secondary">Cancel</button>
  </div>
</div></div>
<div id="equipModal"><div>
  <h3 id="equipModalTitle"></h3>
  <div id="equipModalBody"></div>
  <div style="margin-top:10px;"><button id="equipModalClose" class="secondary">Close</button></div>
</div></div>
<div id="sellModal"><div>
  <h3 id="sellModalTitle"></h3>
  <div id="sellModalBody"></div>
  <div style="margin-top:12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
    <button id="sellConfirm">Sell</button>
    <button id="sellCancel" class="secondary">Cancel</button>
  </div>
</div></div>
<div id="tomeModal"><div>
  <h3>Use Tome — <span id="tomeModalName"></span></h3>
  <div id="tomeModalBody"></div>
  <div style="margin-top:10px;"><button id="tomeModalClose" class="secondary">Close</button></div>
</div></div>
<div id="specialModal"><div>
  <h3>Use Scroll — <span id="specialModalName"></span></h3>
  <div id="specialModalBody"></div>
  <div style="margin-top:10px;"><button id="specialModalClose" class="secondary">Close</button></div>
</div></div>
<div id="confirmModal"><div>
  <h3 id="confirmMsg"></h3>
  <div style="margin-top:14px; display:flex; gap:10px; justify-content:center;">
    <button id="confirmYes">Confirm</button>
    <button id="confirmNo" class="secondary">Cancel</button>
  </div>
</div></div>
<script>
const SCALE = 5;
function spriteHTML(key, scale=SCALE){
  const s = SPRITES[key];
  if(!s) return '';
  const w = s.grid[0].length, h = s.grid.length;
  let shadows = [];
  s.grid.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ const ch=row[x]; if(ch!=='.'&&s.pal[ch]) shadows.push(`${x*scale}px ${y*scale}px 0 0 ${s.pal[ch]}`); } });
  return `<div class="sprite-box" style="width:${w*scale}px;height:${h*scale}px;"><div class="pixel-sprite" style="width:${scale}px;height:${scale}px;box-shadow:${shadows.join(',')};"></div></div>`;
}
const PLAYER_GRID = ['...hhhh....','..hssssh...','..sswwss...','..sssss....','.aaaaaaa...','.aaaaaaaa..','.aa.aa.aa..','.oo....oo..','.oo....oo..'];
const SPRITES = {
  player:{pal:{o:'#2b2138',s:'#e8b98b',h:'#5b3a29',a:'#7a4fd1',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_finn:{pal:{o:'#2b2138',s:'#e8b98b',h:'#5b3a29',a:'#3b6fd1',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_mira:{pal:{o:'#2b2138',s:'#e8b98b',h:'#2b1a40',a:'#8a3bd1',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_tess:{pal:{o:'#2b2138',s:'#e8b98b',h:'#3a2a1a',a:'#2f9e4a',b:'#c9a12e',w:'#e9e1f5'},grid:PLAYER_GRID},
  ally_garrick:{pal:{o:'#2b2138',s:'#e8b98b',h:'#5b3a29',a:'#b03535',b:'#8a6a1e',w:'#e9e1f5'},grid:PLAYER_GRID},
  slime:{pal:{o:'#1d6b2c',O:'#4fbf5b',w:'#eaffea',k:'#123a1a'},grid:['..oOOOo..','.oOOOOOo.','oOOwOwOOo','oOOOOOOOo','oOOOOOOOo','.oOOOOOo.','..ooooo..']},
  goblin:{pal:{g:'#5f9e4a',d:'#2f5a26',b:'#6b4a2b',w:'#eaeaea',k:'#111'},grid:['..dggd...','.dgwgwd..','.dgggd...','..bbb....','.bbbbb...','.b.b.b...','.k...k...']},
  wolf:{pal:{g:'#6b6b78',d:'#3a3a45',w:'#eaeaea',k:'#111'},grid:['.d....d..','dgd..dgd.','dggggggd.','.gwgggwg.','.ggggggg.','d.g..g.d.','d.g..g.d.']},
  boss:{pal:{r:'#8a1f2b',d:'#3a0d12',w:'#ffdca8',k:'#111',b:'#5a1010'},grid:['d..rrrr..d','.d rwwr d.','..drrrrd..','.brrrrrrb.','bbrrrrrrbb','b.b....b.b','b.b....b.b']},
  tree:{pal:{g:'#2f8a3f',G:'#3fae53',b:'#5a3a20'},grid:['..gGGg...','.gGGGGg..','gGGGGGGg.','.gGGGGg..','...bb....','...bb....','...bb....']},

function mpRegen(c){ return Math.max(1, Math.round((c.d.mag||0)*0.1)+1); }
function mpKill(c){ return 5 + Math.floor((c.d.mag||0)*0.3); }
function getKnownActives(e){ const list = CLASS_ACTIVE_SKILLS[e.class] ? CLASS_ACTIVE_SKILLS[e.class].slice() : []; if(e.skills && e.skills['s_berserk']) list.push('act_berserk'); if(e.skills && e.skills['s_regrowth']) list.push('act_regrowth'); return list; }
function skillDmg(id,c){ const sk=ACTIVE_SKILLS[id]; const st = sk.stat==='mag'?(c.d.mag||0):c.atk; return sk.mult*st; }
function chooseActiveSkill(c, node){
  const monsters = node.monsterGroup.filter(m=>m.hp>0);
  const known = getKnownActives(c.en);
  const aff = known.filter(id => (c.en.mp||0) >= ACTIVE_SKILLS[id].cost);
  if(!aff.length) return null;
  if(c.hp/c.maxHp < 0.5){
    const heal = aff.find(id=>ACTIVE_SKILLS[id].type==='heal');
    if(heal) return heal;
  }
  const dmg = aff.filter(id=>ACTIVE_SKILLS[id].type==='damage' && monsters.length);
  if(dmg.length){
    dmg.sort((a,b)=>skillDmg(b,c)-skillDmg(a,c));
    return dmg[0];
  }
  const buff = aff.find(id=>ACTIVE_SKILLS[id].type==='buff');
  if(buff) return buff;
  return null;

function castActiveSkill(c, id, nodeId, z, ev, quiet){
  const sk=ACTIVE_SKILLS[id];
  const node=S.deployedNodes[nodeId]; if(!node) return;
  c.en.mp -= sk.cost;
  const monsters = node.monsterGroup.filter(m=>m.hp>0);
  if(sk.type==='damage'){
    const targets = sk.target==='all' ? monsters : (monsters.length ? [monsters[Math.floor(Math.random()*monsters.length)]] : []);
    targets.forEach(t=>{
      const stat = sk.stat==='mag' ? (c.d.mag||0) : c.atk;
      let dmg = Math.max(1, Math.round(stat * sk.mult) - z.monster.def);
      if(c.critChance && Math.random()*100 < c.critChance) dmg = Math.round(dmg*(1+(c.critDmg||0)/100));
      t.hp -= dmg;
      if(c.lifesteal>0) c.en.hp = Math.min(c.en.maxHp, c.en.hp + Math.round(dmg*c.lifesteal/100));
      if(ev) ev.hits.push({key:c.key, dmg, monsterIdx:node.monsterGroup.indexOf(t), nodeId});
      if(!quiet) log(`✦ ${c.nm} used ${sk.name}! (-${Math.round(dmg)})`);
    });
  } else if(sk.type==='heal'){
    if(sk.target==='all'){
      nodeCombatants(nodeId).forEach(a=>{ if(a.downed<=0) a.en.hp = Math.min(a.en.maxHp, a.en.hp + Math.round(a.en.maxHp*sk.mult)); });
      if(!quiet) log(`✚ ${c.nm} used ${sk.name}!`);
    } else {
      const allies = nodeCombatants(nodeId).filter(a=>a.downed<=0 && a.hp<a.maxHp).sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp));
      if(allies[0]){ allies[0].en.hp = Math.min(allies[0].en.maxHp, allies[0].en.hp + Math.round(allies[0].en.maxHp*sk.mult)); if(!quiet) log(`✚ ${c.nm} healed ${allies[0].nm}!`); }
    }
  } else if(sk.type==='buff'){
    c.en.shield = (c.en.shield||0) + Math.round(c.atk * sk.mult);
    if(!quiet) log(`🛡 ${c.nm} used ${sk.name}!`);
  }
}
function tickNode(nodeId,quiet,ev){ const z=getZoneById(nodeId); if(!z||z.type!=='combat') return; const node=S.deployedNodes[nodeId]; if(!node) return; ensureMonsterGroupNode(nodeId,z); const cs=nodeCombatants(nodeId); const aliveMonsters=()=>node.monsterGroup.filter(m=>m.hp>0);

  cs.forEach(c=>{
    if(c.downed>0||c.hp<=0) return;

            if(c.lifesteal>0) c.en.hp=Math.min(c.en.maxHp,c.en.hp+Math.round(b*c.lifesteal/100));
            c.en.berserkCd=8;

  if(aliveMonsters().length===0){ if(ev) ev.monsterDied=true; if(!S.clearedZones[z.id]){ S.clearedZones[z.id]=true; onNodeCleared(z); } node.monsterGroup=[]; ensureMonsterGroupNode(nodeId,z); }
  else { const alive=cs.filter(c=>c.downed<=0&&c.hp>0); const af=alive.filter(c=>c.row==='front'); const tp=af.length?af:alive; if(tp.length){ aliveMonsters().forEach(()=>{ const t=tp[Math.floor(Math.random()*tp.length)]; const psAI = (S.player.prestigeShop&&S.player.prestigeShop.ps_ai); let md=Math.max(1,z.monster.atk-t.def); if(psAI && t.row==='back') md=Math.round(md*0.5); if(t.en.shield&&t.en.shield>0){ const ab=Math.min(t.en.shield,md); md-=ab; t.en.shield-=ab; } t.hp-=md; if(t.hp<=0){ t.hp=0; t.downed=3; if(!quiet) log(`${t.nm} downed!`); } if(ev) ev.monsterHits.push({key:t.key,dmg:md,nodeId}); }); } }
  cs.forEach(c=>{ if(c.downed>0){ c.downed-=1; if(c.downed<=0){ const cost=reviveCost(c.en); if(S.gold>=cost){ S.gold-=cost; c.hp=c.maxHp; c.en.mp=c.en.maxMp; log(`${c.nm} revived (-${cost}g)`); } else { c.downed=1; if(!quiet) toast(`${c.nm} needs ${cost}g to revive`); } } } });
}

function renderCharSkills(k){ const e=charEntity(k); const maxCol=Math.max(...SKILL_TREE.map(n=>n.col)); const maxRow=Math.max(...SKILL_TREE.map(n=>n.row)); const COLW=112,ROWH=98,NW=92,NH=74,PAD=16; const w=PAD*2+(maxCol+1)*COLW,h=PAD*2+(maxRow+1)*ROWH; const ctr=n=>({x:PAD+n.col*COLW+NW/2,y:PAD+n.row*ROWH+NH/2}); let lines=''; SKILL_TREE.forEach(n=>{ (n.pre||[]).forEach(pid=>{ const p=SKILL_TREE.find(x=>x.id===pid); if(!p) return; const a=ctr(p),b=ctr(n); lines+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${e.skills[n.id]?'#4fbf5b':'#4a3d6b'}" stroke-width="3"/>`; }); }); let nodes=''; SKILL_TREE.forEach(n=>{ const un=!!e.skills[n.id]; const av=!n.requiresTome&&!un&&(n.pre||[]).every(p=>e.skills[p])&&e.skillPts>=n.cost; const ta=n.requiresTome&&!un&&Object.entries(ITEMS).some(([id,it])=>it.tome===n.requiresTome&&gridCountMat(id)>0); const pos={left:PAD+n.col*COLW,top:PAD+n.row*ROWH}; const sc=un?'unlocked':(n.requiresTome?'locked tome':(av?'available':'locked')); const tag=n.branch==='Sub'?`<span class="branchtag Sub">${n.sub}</span>`:`<span class="branchtag ${n.branch}">${n.branch}</span>`; const nodeTip=`${n.name} — ${n.desc}${n.requiresTome?`\nRequires Tome: ${n.requiresTome}`:`\nCost: ${n.cost} skill pt${n.cost>1?'s':''}`}${(n.pre||[]).length?`\nRequires: ${n.pre.map(pid=>SKILL_TREE.find(x=>x.id===pid)?.name||pid).join(', ')}`:''}`; nodes+=`<div class="skillNode ${sc}" style="left:${pos.left}px;top:${pos.top}px;" data-skill-char="${k}:${n.id}" title="${nodeTip}">${tag}<div class="nname">${n.name}${un?' ✔':''}</div><div class="cost">${n.requiresTome?(un?'':(ta?'Use Tome →':'needs Tome')):('Cost '+n.cost)}</div></div>`; }); const knownActives=getKnownActives(e); const activeHtml=knownActives.map(id=>{ const sk=ACTIVE_SKILLS[id]; const statLabel=sk.stat==='mag'?'MAG':'ATK'; const effectLine=sk.type==='damage'?`${Math.round(sk.mult*100)}% ${statLabel} dmg → ${sk.target==='all'?'all foes':'one foe'}`:sk.type==='heal'?`Heal ${Math.round(sk.mult*10 function renderCharPrestige(k){ const e=charEntity(k); const can=e.level>=15; const gain=Math.floor(Math.pow(e.level,0.8)); const rgain=Math.max(1,Math.floor(e.level/15)); const shop=PRESTIGE_SHOP.map(s=>{ const bought=e.prestigeShop&&e.prestigeShop[s.id]; return `<div style="border:1px solid var(--border);border-radius:6px;padding:8px;background:var(--panel2);"><span class="branchtag Prestige">Shop</span> <b>${s.name}</b>${bought?' ✔':''}<div class="small">${s.desc}</div>${!bought?`<button data-buyshop="${k}:${s.id}" ${(e.essence||0)<s.cost?'disabled':''}>${s.cost} Ess</button>`:'<span class="small">Owned</span>'}</div>`; }).join(''); return `<div class="card"><h3>${charName(k)} Rebirth (${e.rebirths||0} total)</h3><p class="small">Resets level/XP/skills/stats; gear→grid; grants Essence. Reborn chars show gold aura.</p><p>Gain <b>${gain}</b> Essence and <b>${rgain}</b> Rebirth${rgain>1?'s':''} ${can?'':'(Lv15+)'}.</p><button data-rebirth="${k}" ${can?'':'disabled'}>Rebirth</button></div><div class="card"><h3>Prestige Ranks (${e.essence||0} Essence)</h3><p class="small">Rebirth to gain Essence (= floor(Lv^0.8)). Spend on permanent bonuses persisting through rebirths.</p><div class="skilllist">${PRESTIGE_TREE.map(n=>{ const rk=e.prestigeRanks[n.id]||0; const cost=n.baseCost*(rk+1); const mx=rk>=n.maxRank; return `<div style="border:1px solid var(--border);border-radius:6px;padding:8px;background:var(--panel2);"><span class="branchtag Prestige">Prestige</span> <b>${n.name}</b> (${rk}/${n.maxRank})<div class="small">${n.desc}</div>${!mx?`<button data-prestige-char="${k}:${n.id}" ${(e.essence||0)<cost?'disabled':''}>${cost} Ess</button>`:'<span class="small">MAX</span>'}</div>`; }).join('')}</div></div><div class="card"><h3>One-Time Prestige Shop (permanent, per-character)</h3><p class="small">Spend Essence once for permanent unlocks. These persist through rebirths.</p><div class="skilllist">${shop}</div></div>`; }

  document.querySelectorAll('[data-enhance]').forEach(el=>el.onclick=()=>{ const uid=el.dataset.enhance; const k=selectedChar||'player'; enhanceGear(uid, charEntity(k)); });
  const sb=document.getElementById('sellBin'); if(sb){ sb.addEventListener('dragover',e=>{ e.preventDefault(); sb.classList.add('dragover'); }); sb.addEventListener('dragleave',()=>sb.classList.remove('dragover')); sb.addEventListener('drop',e=>{ e.preventDefault(); sb.classList.remove('dragover'); handleSellDrop(parseInt(e.dataTransfer.getData('text/plain'))); }); }
  const recruitRankEl=document.getElementById('recruitRank'); if(recruitRankEl) recruitRankEl.onchange=()=>{ recruitFilterRank=recruitRankEl.value; renderAll(); };
  const recruitClassEl=document.getElementById('recruitClass'); if(recruitClassEl) recruitClassEl.onchange=()=>{ recruitFilterClass=recruitClassEl.value; renderAll(); };
  document.querySelectorAll('[data-recruit-clearfilters]').forEach(el=>el.onclick=()=>{ recruitFilterRank='all';recruitFilterClass='all'; renderAll(); });
  document.querySelectorAll('[data-rename-char]').forEach(el=>el.onclick=()=>{ const k=el.dataset.renameChar; const e=charEntity(k); if(k==='player') return; const inp=document.getElementById('renameInput'); if(!inp) return; const v=inp.value.trim().slice(0,20); if(v){ e.customName=v; toast(`${memberPool(k).name} renamed to ${v}`); } renderAll(); });
}
runOffline();
renderAll();
</script>
</body>
</html>
